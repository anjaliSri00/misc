<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Registration</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #fff;
            color: #333;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        :root {
            --bw-white: #fff;
            --bw-black: #444444;
            /* softened charcoal */
            --bw-gray-200: #d4d4d4;
            /* light gray to match frontend */
            --bw-gray-300: #e6e6e6;
            --bw-gray-700: #3a3a3a;
            /* darker gray if needed for hover */
        }

        /* Header */
        .header {
            padding: 0px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            /* background-color: red; */
        }

        .logo-section {
            display: flex;
            align-items: center;
        }

        .logo-img {
            width: 140px;
            height: 50px;
            object-fit: contain;
            display: inline-block;
        }

        /* Banner */
        .notice-banner {
            /* background-color: var(--bw-gray-200); */
            color: var(--bw-black);
            text-align: center;
            padding: 8px;
            font-weight: bold;
         
            font-size: 20px;
        }

        /* Form */
        .form-container {
            padding: 20px;
            background-color: var(--bw-white);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            width: 100%;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .section-header {
            background-color: var(--bw-gray-200);
            color: var(--bw-black);
            text-align: center;
            padding: 8px;
            font-weight: bold;
            font-size: 16px;
            margin: 20px 0 15px;
        }

        /* Category of Work */
        .checkbox-container {
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px;
            background-color: #f5f5f5;
            max-height: 260px;
            overflow-y: auto;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 4px 0;
        }

        .checkbox-item input {
            margin-right: 8px;
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--bw-black);
        }

        .checkbox-item input:checked {
            accent-color: var(--bw-black);
        }

        .checkbox-item label {
            font-size: 12px;
            cursor: pointer;
        }

        .checkbox-item:hover {
            background-color: var(--bw-gray-300);
            border-radius: 3px;
        }

        /* Buttons */
        .button-container {
            text-align: center;
            padding: 10px;
            gap: 15px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 30px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            min-width: 120px;
        }

        .btn-submit {
            background-color: var(--bw-black);
            color: #fff;
        }

        .btn-submit:hover {
            background-color: var(--bw-gray-700);
        }

        .btn-cancel {
            background-color: #666;
            color: #fff;
        }

        .btn-cancel:hover {
            background-color: #555;
        }

        .required-note {
            text-align: right;
            color: red;
            font-size: 12px;
            margin-bottom: 15px;
        }

        /* Focus */
        input:focus,
        select:focus,
        textarea:focus {
            outline: 1px solid var(--bw-black);
            border-color: var(--bw-black);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .form-row {
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .container {
                margin: 10px;
            }

            .logo-img {
                width: 80px;
                height: 80px;
            }
        }

        @media (max-width: 480px) {
            .form-container {
                padding: 12px;
            }

            .logo-img {
                width: 64px;
                height: 64px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-section">
                <img src="../frontend/image/urbanvillageindia.png" alt="Urban Village Logo" class="logo-img">
            </div>
            <div class="notice-banner">Partner Registration</div>
        </header>

        <div class="form-container">


 <div class="required-note">(*) Fields are Mandatory</div>


            <form id="partnerForm" novalidate>
                <div class="section-header">Basic Details</div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="partnerName">Name <span style="color:red;">*</span></label>
                        <input type="text" id="partnerName" name="partnerName" placeholder="Enter full name" required>
                    </div>
                    <div class="form-group">
                        <label for="mobile">Mobile <span style="color:red;">*</span></label>
                        <input type="tel" id="mobile" name="mobile" placeholder="e.g., 9876543210" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="panNo">PAN No. <span style="color:red;">*</span></label>
                        <input type="text" id="panNo" name="panNo" placeholder="e.g., ABCDE1234F" required>
                    </div>
                    <div class="form-group">
                        <label for="city">City <span style="color:red;">*</span></label>
                        <input type="text" id="city" name="city" placeholder="Enter city" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label for="address">Address</label>
                        <textarea id="address" name="address" placeholder="Enter full address"></textarea>
                    </div>
                </div>

                <div class="section-header">Bank Details</div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="bankName">Bank Name <span style="color:red;">*</span></label>
                        <input type="text" id="bankName" name="bankName" placeholder="Enter bank name" required>
                    </div>
                    <div class="form-group">
                        <label for="accountNumber">Account Number <span style="color:red;">*</span></label>
                        <input type="text" id="accountNumber" name="accountNumber" placeholder="Enter account number"
                            required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="ifscCode">IFSC Code <span style="color:red;">*</span></label>
                        <input type="text" id="ifscCode" name="ifscCode" placeholder="e.g., SBIN0001234" required>
                    </div>
                    <div class="form-group"></div>
                </div>

                <div class="section-header">Work Details</div>
                <div class="form-row">
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label for="itemsInterested">Category of Work <span style="color:red;">*</span></label>
                        <div class="checkbox-container">

                            <div class="checkbox-item">
                                <input type="checkbox" id="architechture" name="itemsInterested" value="Architecture">
                                <label for="architechture">Architecture</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="corporate_interior" name="itemsInterested"
                                    value="Corporate interior">
                                <label for="corporate_interior">Corporate Interior</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="residential_interior" name="itemsInterested"
                                    value="Residential interior">
                                <label for="residential_interior">Residential Interior</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="industerial" name="itemsInterested" value="Industrial">
                                <label for="industerial">Industrial</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="f_b" name="itemsInterested" value="F/B">
                                <label for="f_b">F&B</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="turnkey_projects" name="itemsInterested"
                                    value="Turnkey Projects">
                                <label for="turnkey_projects">Turnkey Projects</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="others" name="itemsInterested" value="others">
                                <label for="others">Others</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="button-container">
                    <button type="submit" class="btn btn-submit">Submit</button>
                    <button type="reset" class="btn btn-cancel">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</body>
<script src="script.js"></script>

</html>
