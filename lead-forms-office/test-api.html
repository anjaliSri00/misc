<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test API Endpoint</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .test-form { max-width: 600px; margin: 0 auto; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
    .result { margin-top: 20px; padding: 15px; border-radius: 4px; }
    .success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
    .error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
  </style>
</head>
<body>
  <div class="test-form">
    <h1>Test Lead Form API</h1>
    <form id="testForm">
      <div class="form-group">
        <label for="interior_service">Interior Service:</label>
        <select id="interior_service" required>
          <option value="">Select service</option>
          <option value="office">Office</option>
          <option value="retail">Retail</option>
          <option value="F & B">F & B</option>
          <option value="other">Other</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="type_of_project">Project Type:</label>
        <select id="type_of_project" required>
          <option value="">Select type</option>
          <option value="new property">New Property</option>
          <option value="renovation property">Renovation Property</option>
          <option value="other">Other</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="property_size">Property Size:</label>
        <input type="text" id="property_size" placeholder="e.g., 1000 sq ft" required>
      </div>
      
      <div class="form-group">
        <label for="budget">Budget:</label>
        <input type="text" id="budget" placeholder="e.g., 5-10 lakhs" required>
      </div>
      
      <div class="form-group">
        <label for="hiring_decision">Hiring Decision:</label>
        <input type="text" id="hiring_decision" placeholder="e.g., Within 1 month" required>
      </div>
      
      <div class="form-group">
        <label for="city">City:</label>
        <input type="text" id="city" placeholder="e.g., Mumbai" required>
      </div>
      
      <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Full name" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="email@example.com" required>
      </div>
      
      <div class="form-group">
        <label for="mobile">Mobile:</label>
        <input type="tel" id="mobile" placeholder="10-digit number" required>
      </div>
      
      <div class="form-group">
        <label>
          <input type="checkbox" id="marketingOptIn" checked>
          Marketing Opt-in
        </label>
      </div>
      
      <button type="submit">Test Submit</button>
    </form>
    
    <div id="result" class="result" style="display: none;"></div>
  </div>

  <script>
    document.getElementById('testForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = {
        interior_service: document.getElementById('interior_service').value,
        type_of_project: document.getElementById('type_of_project').value,
        property_size: document.getElementById('property_size').value,
        budget: document.getElementById('budget').value,
        hiring_decision: document.getElementById('hiring_decision').value,
        city: document.getElementById('city').value,
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        mobile: document.getElementById('mobile').value,
        marketingOptIn: document.getElementById('marketingOptIn').checked
      };
      
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      resultDiv.textContent = 'Submitting...';
      resultDiv.className = 'result';
      
      try {
        const response = await fetch('http://localhost:3000/api/leads/form', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(formData)
        });
        
        const data = await response.json();
        
        if (response.ok) {
          resultDiv.className = 'result success';
          resultDiv.innerHTML = `
            <h3>Success!</h3>
            <p>Lead created with ID: ${data.data.id}</p>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          `;
        } else {
          resultDiv.className = 'result error';
          resultDiv.innerHTML = `
            <h3>Error!</h3>
            <p>Status: ${response.status}</p>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          `;
        }
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.innerHTML = `
          <h3>Network Error!</h3>
          <p>${error.message}</p>
        `;
      }
    });
  </script>
</body>
</html>
