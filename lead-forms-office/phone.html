<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interior Service | Phone Number</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f5f0ea;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
    }

    /* Warm gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #faf7f2 0%, #f0e8e0 100%);
      z-index: 0;
    }

    /* Subtle pattern */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(#c4a47c 0.5px, transparent 0.5px);
      background-size: 24px 24px;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 600px;
      padding: 24px;
    }

    /* Main card */
    .phone-selector {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(140, 108, 85, 0.1);
      overflow: hidden;
    }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #f0e8e0;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .progress {
      width: 78%;
      height: 100%;
      background: #8c6c55;
      border-radius: 6px;
      transition: width 0.3s ease;
    }

    h2 {
      font-size: 26px;
      font-weight: 700;
      color: #2c241a;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #9b8978;
      margin-bottom: 28px;
      font-size: 15px;
      line-height: 1.4;
    }

    /* Form container */
    .form-container {
      padding: 0 32px 20px;
    }

    /* Input wrapper */
    .input-wrapper {
      position: relative;
      border: 1.5px solid #ede3d8;
      border-radius: 16px;
      background: #ffffff;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .input-wrapper:hover {
      border-color: #c4a47c;
    }

    .input-wrapper:focus-within {
      border-color: #8c6c55;
      box-shadow: 0 0 0 3px rgba(140, 108, 85, 0.1);
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: #b8a694;
      z-index: 2;
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      border: none;
      background: transparent;
      font-size: 16px;
      color: #2c241a;
      outline: none;
      font-family: inherit;
    }

    .form-input::placeholder {
      color: #c4b8a8;
    }

    /* Error message */
    .error {
      color: #b91c1c;
      font-size: 12px;
      margin-top: 8px;
      margin-left: 12px;
      display: none;
      align-items: center;
      gap: 6px;
    }

    .error.show {
      display: flex;
    }

    /* Success message */
    .success-msg {
      color: #2e7d64;
      font-size: 12px;
      margin-top: 8px;
      margin-left: 12px;
      display: none;
      align-items: center;
      gap: 6px;
    }

    .success-msg.show {
      display: flex;
    }

    /* Loading state */
    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
      padding: 8px;
      color: #8c6c55;
      font-size: 13px;
    }

    .loading.show {
      display: flex;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #ede3d8;
      border-top-color: #8c6c55;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Button container */
    .btn-container {
      display: flex;
      gap: 16px;
      padding: 20px 32px 36px;
      width: 100%;
    }

    /* Button styles */
    .btn {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-back {
      background: #f5ede6;
      color: #8c6c55;
      border: 1px solid #ede3d8;
    }

    .btn-back:hover {
      background: #efe5db;
      transform: translateY(-1px);
    }

    .btn-continue {
      background: #8c6c55;
      color: #fff;
    }

    .btn-continue:hover:not(:disabled) {
      background: #7a5b46;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(140, 108, 85, 0.25);
    }

    .btn-continue:disabled {
      background: #d4c5b8;
      cursor: not-allowed;
      transform: none;
    }

    /* Close button */
    .close {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 26px;
      cursor: pointer;
      color: #b8a694;
      transition: all 0.2s;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #f8f3ee;
      z-index: 20;
    }
    .close:hover {
      color: #8c6c55;
      background: #efe5db;
      transform: rotate(90deg);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .form-container {
        padding: 0 20px 16px;
      }
      .btn-container {
        padding: 16px 20px 28px;
        gap: 12px;
      }
      h2 {
        font-size: 22px;
      }
      .subtitle {
        font-size: 13px;
      }
      .btn {
        padding: 12px 16px;
        font-size: 14px;
      }
      .form-input {
        font-size: 14px;
      }
    }
  </style>
  <script src="config.js"></script>
</head>
<body>
  <div class="container">
    <div class="phone-selector">

      <!-- Progress bar -->
      <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
      </div>

      <!-- Header -->
      <div class="form-container">
        <h2>📞 Your number is safe with us</h2>
        <div class="subtitle">Some professionals prefer to provide quotes over the phone to understand your needs better.</div>
      </div>

      <!-- Phone Input -->
      <div class="form-container">
        <div class="input-wrapper">
          <span class="input-icon">📱</span>
          <input id="phoneInput" type="tel" class="form-input" placeholder="Enter 10-digit mobile number" autocomplete="tel" maxlength="10" />
        </div>
        <div id="error" class="error">
          <span>⚠️</span> Please enter a valid 10-digit mobile number
        </div>
        <div id="loading" class="loading">
          <div class="spinner"></div>
          <span>Sending verification code...</span>
        </div>
      </div>

      <!-- Buttons -->
      <div class="btn-container">
        <button class="btn btn-back" id="backBtn">← Back</button>
        <button class="btn btn-continue" id="continueBtn" disabled>Continue →</button>
      </div>
    </div>
  </div>

  <script>
    let previousFormData = {};
    let formData = {};

    // DOM elements
    const phoneInput = document.getElementById('phoneInput');
    const continueBtn = document.getElementById('continueBtn');
    const backBtn = document.getElementById('backBtn');
    const closeBtn = document.getElementById('closeBtn');
    const errorEl = document.getElementById('error');
    const loadingEl = document.getElementById('loading');

    // Helper functions
    function isValidPhone(value) {
      return /^[6-9][0-9]{9}$/.test(value);
    }

    function normalizeIndianNumber(value) {
      let digits = String(value).replace(/\D/g, '');
      // Remove country code if present
      if (digits.startsWith('91') && digits.length > 10) digits = digits.slice(-10);
      // Remove leading zeros
      if (digits.startsWith('0') && digits.length > 10) digits = digits.replace(/^0+/, '');
      // Take last 10 digits only
      if (digits.length > 10) digits = digits.slice(-10);
      return digits;
    }

    function formatIndianNumber(digits) {
      if (!digits) return '';
      const trimmed = digits.slice(0, 10);
      if (trimmed.length <= 5) return trimmed;
      return `${trimmed.slice(0,5)}${trimmed.slice(5)}`;
    }

    function updateContinueButton() {
      const rawValue = phoneInput.value.trim();
      const normalized = normalizeIndianNumber(rawValue);
      const valid = isValidPhone(normalized);
      
      if (rawValue && !valid) {
        errorEl.classList.add('show');
      } else {
        errorEl.classList.remove('show');
      }
      
      continueBtn.disabled = !valid;
      
      if (valid) {
        formData.phone = normalized;
      }
    }

    function formatInput() {
      const rawValue = phoneInput.value.trim();
      const normalized = normalizeIndianNumber(rawValue);
      const formatted = formatIndianNumber(normalized);
      if (formatted !== phoneInput.value) {
        phoneInput.value = formatted;
      }
      updateContinueButton();
    }

    function saveToLocalStorage() {
      // Load existing complete data
      let completeData = {};
      const existingData = localStorage.getItem('completeFormData') || localStorage.getItem('finalFormData');
      if (existingData) {
        try {
          completeData = JSON.parse(existingData);
        } catch(e) {}
      }
      
      const finalData = {
        ...completeData,
        ...formData,
        phone: formData.phone,
        timestamp: new Date().toISOString()
      };
      
      localStorage.setItem('completePhoneFormData', JSON.stringify(finalData));
      localStorage.setItem('completeFormData', JSON.stringify(finalData));
    }

    function loadPreviousPhoneData() {
      const saved = localStorage.getItem('completePhoneFormData');
      if (saved) {
        try {
          const savedData = JSON.parse(saved);
          if (savedData.phone) {
            const normalized = normalizeIndianNumber(savedData.phone);
            formData.phone = normalized;
            phoneInput.value = formatIndianNumber(normalized);
            updateContinueButton();
          }
        } catch(e) {}
      }
      
      // Also load from completeFormData
      const completeData = localStorage.getItem('completeFormData');
      if (completeData && !phoneInput.value) {
        try {
          const parsed = JSON.parse(completeData);
          if (parsed.phone) {
            const normalized = normalizeIndianNumber(parsed.phone);
            formData.phone = normalized;
            phoneInput.value = formatIndianNumber(normalized);
            updateContinueButton();
          }
        } catch(e) {}
      }
    }

    function loadPreviousFormData() {
      const fromPrev = localStorage.getItem('completeEmailFormData');
      const fromThis = localStorage.getItem('completePhoneFormData');
      const fromComplete = localStorage.getItem('completeFormData');
      const raw = fromThis || fromComplete || fromPrev;
      if (raw) {
        try {
          previousFormData = JSON.parse(raw);
          if (previousFormData.phone && !phoneInput.value) {
            const normalized = normalizeIndianNumber(previousFormData.phone);
            formData.phone = normalized;
            phoneInput.value = formatIndianNumber(normalized);
            updateContinueButton();
          }
        } catch(e) {}
      }
    }

    // OTP API call
    async function callOtpApi(payload) {
      if (typeof CONFIG === 'undefined') {
        console.warn('CONFIG not found, using mock OTP');
        return { meta: { status: 200 }, data: { session_id: 'mock_session_' + Date.now() } };
      }
      const res = await fetch(`${CONFIG.API.BASE_URL}/api/v1/common/otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      return await res.json();
    }

    async function continueToNext() {
      const normalized = normalizeIndianNumber(phoneInput.value.trim());
      if (!isValidPhone(normalized)) return;

      formData.phone = normalized;
      saveToLocalStorage();

      // Combine with all previous data
      const allData = JSON.parse(localStorage.getItem('completeFormData') || '{}');
      const finalData = {
        ...allData,
        phone: normalized,
        completedAt: new Date().toISOString()
      };
      
      localStorage.setItem('completeFormData', JSON.stringify(finalData));
      localStorage.setItem('finalFormData', JSON.stringify(finalData));
      localStorage.setItem('completePhoneFormData', JSON.stringify(finalData));

      try {
        continueBtn.disabled = true;
        loadingEl.classList.add('show');
        errorEl.classList.remove('show');

        const response = await callOtpApi({
          mobile: normalized,
          action: "generate"
        });

        loadingEl.classList.remove('show');

        if (response.meta?.status == 200) {
          localStorage.setItem("otp_session_id", response.data.session_id);
          window.location.href = 'otp.html';
        } else {
          errorEl.innerHTML = `<span>⚠️</span> ${response.meta?.message || 'Failed to send OTP. Please try again.'}`;
          errorEl.classList.add('show');
          continueBtn.disabled = false;
        }
      } catch (err) {
        console.error(err);
        loadingEl.classList.remove('show');
        errorEl.innerHTML = `<span>⚠️</span> Server error. Please check your connection and try again.`;
        errorEl.classList.add('show');
        continueBtn.disabled = false;
      }
    }

    function goBack() {
      saveToLocalStorage();
      window.location.href = 'email.html';
    }

    function closeModal() {
      console.log('Close clicked - staying on page');
    }

    // Event listeners
    function setupEventListeners() {
      if (phoneInput) {
        phoneInput.addEventListener('input', formatInput);
        // Restrict length
        phoneInput.addEventListener('keyup', function() {
          if (this.value.replace(/\D/g, '').length > 10) {
            this.value = this.value.slice(0, 11);
          }
          formatInput();
        });
      }
      
      if (continueBtn) {
        continueBtn.addEventListener('click', continueToNext);
      }
      
      if (backBtn) {
        backBtn.addEventListener('click', goBack);
      }
      
      if (closeBtn) {
        closeBtn.addEventListener('click', closeModal);
      }
      
      // Close on outside click
      document.querySelector('.container')?.addEventListener('click', function(e) {
        if (e.target === document.querySelector('.container')) {
          closeModal();
        }
      });
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadPreviousFormData();
      loadPreviousPhoneData();
      updateContinueButton();
      setupEventListeners();
    });
  </script>
</body>
</html>
