<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interior Service | Hiring Decision</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f5f0ea;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
    }

    /* Warm gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #faf7f2 0%, #f0e8e0 100%);
      z-index: 0;
    }

    /* Subtle pattern */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(#c4a47c 0.5px, transparent 0.5px);
      background-size: 24px 24px;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 600px;
      padding: 24px;
    }

    /* Main card */
    .hiring-selector {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(140, 108, 85, 0.1);
      overflow: hidden;
    }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #f0e8e0;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .progress {
      width: 95%;
      height: 100%;
      background: #8c6c55;
      border-radius: 6px;
      transition: width 0.3s ease;
    }

    h2 {
      font-size: 24px;
      font-weight: 700;
      color: #2c241a;
      margin-bottom: 24px;
      text-align: center;
    }

    /* Options grid */
    .options-grid {
      padding: 0 52px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option {
      display: flex;
      align-items: center;
      border: 1.5px solid #ede3d8;
      border-radius: 16px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.2s;
      background: #ffffff;
    }
    .option:hover {
      border-color: #c4a47c;
      background: #fefcf9;
    }
    .option.selected {
      border-color: #8c6c55;
      background: #fffaf5;
      box-shadow: 0 4px 12px rgba(140, 108, 85, 0.1);
    }
    .option input[type="radio"] {
      margin-right: 14px;
      width: 18px;
      height: 18px;
      accent-color: #8c6c55;
      cursor: pointer;
    }
    .option input[type="text"] {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      background: transparent;
      padding: 4px 0;
      font-family: inherit;
      color: #2c241a;
    }
    .option input[type="text"]::placeholder {
      color: #c4a47c;
    }
    .option-text {
      font-size: 15px;
      font-weight: 500;
      color: #2c241a;
      flex: 1;
    }
    .option.selected .option-text {
      color: #8c6c55;
    }

    /* Special styling for other option */
    .option-other {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .option-other input[type="text"] {
      border: none;
      padding: 0;
      margin: 0;
    }

    /* Button container */
    .btn-container {
      display: flex;
      gap: 16px;
      padding: 10px 52px 40px;
      width: 100%;
    }

    /* Button styles */
    .btn {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-back {
      background: #f5ede6;
      color: #8c6c55;
      border: 1px solid #ede3d8;
    }

    .btn-back:hover {
      background: #efe5db;
      transform: translateY(-1px);
    }

    .btn-continue {
      background: #8c6c55;
      color: #fff;
    }

    .btn-continue:hover:not(:disabled) {
      background: #7a5b46;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(140, 108, 85, 0.25);
    }

    .btn-continue:disabled {
      background: #d4c5b8;
      cursor: not-allowed;
      transform: none;
    }

    /* Close button */
    .close {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 26px;
      cursor: pointer;
      color: #b8a694;
      transition: all 0.2s;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #f8f3ee;
      z-index: 20;
    }
    .close:hover {
      color: #8c6c55;
      background: #efe5db;
      transform: rotate(90deg);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .options-grid {
        padding: 0 24px 20px;
      }
      .btn-container {
        padding: 10px 24px 32px;
        gap: 12px;
      }
      h2 {
        font-size: 20px;
      }
      .btn {
        padding: 12px 16px;
        font-size: 14px;
      }
      .option-text {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hiring-selector">
      <!-- Progress bar -->
      <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
      </div>

      <!-- Header -->
      <div class="options-grid">
        <h2>How likely are you to make a hiring decision?</h2>
      </div>

      <!-- Hiring Options -->
      <div class="options-grid" id="optionsGrid">
        <label class="option" data-value="ready-to-hire-now">
          <input type="radio" name="hiringDecision" value="I'm ready to hire now">
          <span class="option-text">I'm ready to hire now</span>
        </label>

        <label class="option" data-value="likely-to-hire">
          <input type="radio" name="hiringDecision" value="I'm likely to hire someone">
          <span class="option-text">I'm likely to hire someone</span>
        </label>

        <label class="option" data-value="planning-and-researching">
          <input type="radio" name="hiringDecision" value="I'm planning and researching">
          <span class="option-text">I'm planning and researching</span>
        </label>

        <label class="option option-other" data-value="other">
          <input type="radio" name="hiringDecision" value="other">
          <input type="text" placeholder="Other (please specify)">
        </label>
      </div>

      <!-- Buttons in one line -->
      <div class="btn-container">
        <button class="btn btn-back" id="backBtn">← Back</button>
        <button class="btn btn-continue" id="continueBtn" disabled>Continue →</button>
      </div>
    </div>
  </div>

  <script>
    let formData = {};
    let previousFormData = {};

    // DOM elements
    const options = document.querySelectorAll('.option');
    const continueBtn = document.getElementById('continueBtn');
    const closeBtn = document.getElementById('closeBtn');
    const backBtn = document.getElementById('backBtn');

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      continueBtn.disabled = true;
      loadPreviousFormData();
      setupEventListeners();
    });

    function loadPreviousFormData() {
      // Get data from all previous forms
      const completeData = localStorage.getItem('completeFormData');
      const budgetData = localStorage.getItem('completeBudgetFormData');
      const finalData = localStorage.getItem('finalFormData');
      
      const raw = finalData || completeData || budgetData;
      if (raw) {
        try {
          previousFormData = JSON.parse(raw);
          console.log("Loaded previous data:", previousFormData);
        } catch(e) { console.warn(e); }
      }

      // Also load individual step data
      const spacesData = localStorage.getItem('spacesFormData');
      const serviceData = localStorage.getItem('serviceFormData');
      const projectData = localStorage.getItem('projectType');
      const areaData = localStorage.getItem('areaBhkData');
      
      if (spacesData) Object.assign(previousFormData, JSON.parse(spacesData));
      if (serviceData) Object.assign(previousFormData, JSON.parse(serviceData));
      if (projectData) Object.assign(previousFormData, JSON.parse(projectData));
      if (areaData) Object.assign(previousFormData, JSON.parse(areaData));

      // Preselect hiring decision if returning
      const savedHiring = localStorage.getItem('completeHiringFormData');
      if (savedHiring) {
        try {
          const saved = JSON.parse(savedHiring);
          if (saved.hiringDecision) {
            const value = saved.hiringDecision;
            let option = null;
            
            // Check if it's a predefined option or custom
            if (value === "I'm ready to hire now" || value === "ready-to-hire-now") {
              option = Array.from(options).find(opt => 
                opt.querySelector('input[type="radio"]')?.value === "I'm ready to hire now"
              );
            } else if (value === "I'm likely to hire someone" || value === "likely-to-hire") {
              option = Array.from(options).find(opt => 
                opt.querySelector('input[type="radio"]')?.value === "I'm likely to hire someone"
              );
            } else if (value === "I'm planning and researching" || value === "planning-and-researching") {
              option = Array.from(options).find(opt => 
                opt.querySelector('input[type="radio"]')?.value === "I'm planning and researching"
              );
            } else if (value === "other") {
              option = Array.from(options).find(opt => 
                opt.querySelector('input[type="radio"]')?.value === "other"
              );
              if (option && saved.otherHiringDecision) {
                const textInput = option.querySelector('input[type="text"]');
                if (textInput) textInput.value = saved.otherHiringDecision;
                formData.otherHiringDecision = saved.otherHiringDecision;
              }
            } else if (value && !["ready-to-hire-now", "likely-to-hire", "planning-and-researching", "other"].includes(value)) {
              // Custom value stored
              option = Array.from(options).find(opt => 
                opt.querySelector('input[type="radio"]')?.value === "other"
              );
              if (option) {
                const textInput = option.querySelector('input[type="text"]');
                if (textInput) textInput.value = value;
                formData.otherHiringDecision = value;
              }
            }
            
            if (option) {
              options.forEach(opt => opt.classList.remove('selected'));
              option.classList.add('selected');
              const radio = option.querySelector('input[type="radio"]');
              if (radio) radio.checked = true;
              formData.hiringDecision = radio?.value === "other" ? "other" : radio?.value;
              continueBtn.disabled = false;
            }
          }
        } catch(e) { console.warn(e); }
      } else if (previousFormData.hiringDecision) {
        // Restore from previousFormData if available
        const value = previousFormData.hiringDecision;
        const option = Array.from(options).find(opt => {
          const radio = opt.querySelector('input[type="radio"]');
          return radio && (radio.value === value || radio.value === value);
        });
        if (option) {
          options.forEach(opt => opt.classList.remove('selected'));
          option.classList.add('selected');
          const radio = option.querySelector('input[type="radio"]');
          if (radio) radio.checked = true;
          formData.hiringDecision = radio.value;
          continueBtn.disabled = false;
        }
      }
    }

    function setupEventListeners() {
      // Hiring decision selection
      options.forEach(option => {
        option.addEventListener('click', function(e) {
          // Don't trigger if clicking on text input inside other option
          if (e.target.tagName === 'INPUT' && e.target.type === 'text') return;
          
          // Remove previous selection
          options.forEach(opt => opt.classList.remove('selected'));
          // Add selection to clicked option
          this.classList.add('selected');
          
          // Enable continue button
          continueBtn.disabled = false;
          
          // Store selection
          const radio = this.querySelector('input[type="radio"]');
          formData.hiringDecision = radio.value;
          
          // If "other" is selected, focus on text input and handle custom value
          if (radio.value === 'other') {
            const textInput = this.querySelector('input[type="text"]');
            textInput.focus();
            formData.otherHiringDecision = textInput.value;
            // Update hiringDecision to use custom text if present
            textInput.addEventListener('input', function() {
              formData.otherHiringDecision = this.value;
              if (this.value.trim() !== '') {
                formData.hiringDecision = this.value;
              } else {
                formData.hiringDecision = 'other';
              }
              saveToLocalStorage();
            });
          } else {
            // Clear any other text
            if (formData.otherHiringDecision) delete formData.otherHiringDecision;
          }
          
          console.log("Hiring decision selected:", formData);
          saveToLocalStorage();
        });
      });

      // Handle text input in other option separately
      const otherTextInput = document.querySelector('.option-other input[type="text"]');
      if (otherTextInput) {
        otherTextInput.addEventListener('click', function(e) {
          e.stopPropagation();
        });
        otherTextInput.addEventListener('input', function() {
          if (this.value.trim() !== '') {
            formData.hiringDecision = this.value;
            formData.otherHiringDecision = this.value;
          } else {
            formData.hiringDecision = 'other';
            formData.otherHiringDecision = '';
          }
          saveToLocalStorage();
          
          // Also mark the option as selected if not already
          const parentOption = this.closest('.option');
          if (!parentOption.classList.contains('selected')) {
            options.forEach(opt => opt.classList.remove('selected'));
            parentOption.classList.add('selected');
            const radio = parentOption.querySelector('input[type="radio"]');
            if (radio) radio.checked = true;
            continueBtn.disabled = false;
          }
        });
      }

      // Close button
      if (closeBtn) {
        closeBtn.addEventListener('click', closeModal);
      }

      // Back button
      if (backBtn) {
        backBtn.addEventListener('click', goBack);
      }
    }

    function saveToLocalStorage() {
      // Combine all forms data
      const completeFormData = {
        ...previousFormData,
        hiringDecision: formData.hiringDecision === 'other' ? formData.otherHiringDecision : formData.hiringDecision,
        originalHiringValue: formData.hiringDecision,
        otherHiringDecision: formData.otherHiringDecision,
        timestamp: new Date().toISOString()
      };
      
      // Store complete data
      localStorage.setItem('completeHiringFormData', JSON.stringify(completeFormData));
      localStorage.setItem('completeFormData', JSON.stringify(completeFormData));
    }

    function goBack() {
      // Go back to the budget form
      window.location.href = 'budget.html';
    }

    function continueToNext() {
      // Get the final decision value
      let finalDecision = formData.hiringDecision;
      if (finalDecision === 'other' && formData.otherHiringDecision && formData.otherHiringDecision.trim() !== '') {
        finalDecision = formData.otherHiringDecision;
      } else if (finalDecision === 'other') {
        finalDecision = 'Not specified';
      }
      
      if (!finalDecision || finalDecision === 'other') return;
      
      console.log('Hiring decision selected:', finalDecision);
      
      // Combine all forms data
      const completeFormData = {
        ...previousFormData,
        hiringDecision: finalDecision,
        originalHiringValue: formData.hiringDecision,
        otherHiringDecision: formData.otherHiringDecision,
        completedAt: new Date().toISOString()
      };
      
      // Store complete data
      localStorage.setItem('completeHiringFormData', JSON.stringify(completeFormData));
      localStorage.setItem('completeFormData', JSON.stringify(completeFormData));
      localStorage.setItem('finalFormData', JSON.stringify(completeFormData));
      
      // Redirect to the contact/location form
      window.location.href = 'location.html';
    }

    function closeModal() {
      // Do nothing - stay on the same page
      console.log('Close clicked - staying on page');
    }

    // Close modal when clicking outside
    document.querySelector('.container')?.addEventListener('click', function(e) {
      if (e.target === document.querySelector('.container')) {
        closeModal();
      }
    });

    // Attach continue button handler
    continueBtn.addEventListener('click', continueToNext);
  </script>
</body>
</html>
