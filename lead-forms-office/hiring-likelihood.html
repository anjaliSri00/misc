<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiring Likelihood Selection</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      background-image: url('assets/int2.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Modal */
    .modal {
      background: #fff;
      width: 450px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      padding: 24px;
      position: relative;
    }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #e5e7eb;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .progress {
      width: 95%; /* This step is 7/8 complete */
      height: 100%;
      background: #3b82f6;
      transition: width 0.3s ease;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 20px;
      text-align: center;
      color: #1f2937;
    }

    .option {
      display: flex;
      align-items: center;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .option:hover {
      border-color: #3b82f6;
      background: #f8fafc;
    }
    .option.selected {
      border-color: #3b82f6;
      background: #eff6ff;
    }
    .option input {
      margin-right: 12px;
    }

    .option input[type="text"] {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      background: transparent;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 16px;
    }
    .btn:hover {
      background: #2563eb;
    }
    .btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #f8f9fa;
      color: #333;
      border: 2px solid #e9ecef;
      margin-right: 12px;
      width: auto;
      padding: 12px 24px;
    }
    .btn-secondary:hover {
      background: #e9ecef;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    /* Close button */
    .close {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 20px;
      cursor: pointer;
      color: #6b7280;
    }
    .close:hover {
      color: #111827;
    }


  </style>
</head>
<body>
  <div class="overlay">
    <div class="modal">
      <span class="close">&times;</span>

      <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
      </div>



      <h2>How likely are you to make a hiring decision?</h2>

      <label class="option" data-value="ready-to-hire-now">
        <input type="radio" name="hiringDecision" value="ready-to-hire-now">
        I'm ready to hire now
      </label>

      <label class="option" data-value="likely-to-hire">
        <input type="radio" name="hiringDecision" value="likely-to-hire">
        I'm likely to hire someone
      </label>

      <!-- <label class="option" data-value="possibly-hire">
        <input type="radio" name="hiringDecision" value="possibly-hire">
        I will possibly hire someone
      </label> -->

      <label class="option" data-value="planning-and-researching">
        <input type="radio" name="hiringDecision" value="planning-and-researching">
        I'm planning and researching
      </label>

      <label class="option" data-value="other">
        <input type="radio" name="hiringDecision" value="other">
        <input type="text" placeholder="Other">
      </label>

      <div class="button-group">
        <button class="btn btn-secondary" onclick="goBack()">Back</button>
        <button class="btn" id="continueBtn" disabled onclick="continueToNext()">Continue</button>
      </div>
    </div>
  </div>

  <script>
    let formData = {};
    let previousFormData = {};

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      // Ensure continue button is disabled by default
      document.getElementById('continueBtn').disabled = true;
      
      loadPreviousFormData();
      setupEventListeners();
    });

    function loadPreviousFormData() {
      // Prefer the most complete dataset if returning from a later step
      const fromThisStep = localStorage.getItem('completeHiringFormData');
      const fromPrevStep = localStorage.getItem('completeBudgetFormData');
      const raw = fromThisStep || fromPrevStep;
      if (raw) {
        previousFormData = JSON.parse(raw);
        


        // Preselect previously chosen hiring likelihood when revisiting
        if (previousFormData.hiringDecision) {
          const value = previousFormData.hiringDecision;
          const label = document.querySelector(`label.option input[type="radio"][value="${value}"]`);
          if (label) {
            const optionEl = label.closest('.option');
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            optionEl.classList.add('selected');
            label.checked = true;
            formData.hiringDecision = value;
            if (value === 'other' && previousFormData.otherhiringDecision) {
              const otherInput = optionEl.querySelector('input[type="text"]');
              if (otherInput) {
                otherInput.value = previousFormData.otherhiringDecision;
                formData.otherhiringDecision = previousFormData.otherhiringDecision;
              }
            }
            document.getElementById('continueBtn').disabled = false;
          }
        }
      }
    }

    function setupEventListeners() {
      // Hiring likelihood selection
      document.querySelectorAll('.option').forEach(option => {
        option.addEventListener('click', function() {
          // Remove previous selection
          document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
          // Add selection to clicked option
          this.classList.add('selected');
          
          // Enable continue button
          document.getElementById('continueBtn').disabled = false;
          
          // Store selection
          const radio = this.querySelector('input[type="radio"]');
          formData.hiringDecision = radio.value;
          
          // If "other" is selected, focus on text input
          if (radio.value === 'other') {
            const textInput = this.querySelector('input[type="text"]');
            textInput.focus();
            textInput.addEventListener('input', function() {
              formData.otherhiringDecision = this.value;
            });
          }
        });
      });

      // Close button
      document.querySelector('.close').addEventListener('click', closeModal);
    }

    function goBack() {
      // Go back to the budget form
      window.location.href = 'budget.html';
    }

    function continueToNext() {
      // Store the selected hiring likelihood
      console.log('Hiring likelihood selected:', formData);
      
      // Combine all forms data
      const completeFormData = {
        ...previousFormData,
        ...formData
      };
      
      // Store complete data
      localStorage.setItem('completeHiringFormData', JSON.stringify(completeFormData));
      
      // Redirect to the contact information form
      window.location.href = 'location.html';
    }

    function closeModal() {
      // Do nothing - stay on the same page
      // This prevents the white screen issue when clicking outside
    }

    // Close modal when clicking outside
    document.querySelector('.overlay').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });
  </script>
</body>
</html>
