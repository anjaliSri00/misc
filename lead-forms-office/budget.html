<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interior Service | Budget Selection</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f5f0ea;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
    }

    /* Warm gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #faf7f2 0%, #f0e8e0 100%);
      z-index: 0;
    }

    /* Subtle pattern */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(#c4a47c 0.5px, transparent 0.5px);
      background-size: 24px 24px;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 600px;
      padding: 24px;
    }

    /* Main card */
    .budget-selector {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(140, 108, 85, 0.1);
      overflow: hidden;
    }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #f0e8e0;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .progress {
      width: 90%;
      height: 100%;
      background: #8c6c55;
      border-radius: 6px;
      transition: width 0.3s ease;
    }

    h2 {
      font-size: 24px;
      font-weight: 700;
      color: #2c241a;
      margin-bottom: 24px;
      text-align: center;
    }

    /* Options grid */
    .options-grid {
      padding: 0 52px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option {
      display: flex;
      align-items: center;
      border: 1.5px solid #ede3d8;
      border-radius: 16px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.2s;
      background: #ffffff;
    }
    .option:hover {
      border-color: #c4a47c;
      background: #fefcf9;
    }
    .option.selected {
      border-color: #8c6c55;
      background: #fffaf5;
      box-shadow: 0 4px 12px rgba(140, 108, 85, 0.1);
    }
    .option input {
      margin-right: 14px;
      width: 18px;
      height: 18px;
      accent-color: #8c6c55;
      cursor: pointer;
    }
    .option-text {
      font-size: 15px;
      font-weight: 500;
      color: #2c241a;
    }
    .option.selected .option-text {
      color: #8c6c55;
    }

    /* Special styling for discuss option */
    .option-discuss {
      border-color: #e8ddd0;
      background: #fefbf8;
    }
    .option-discuss:hover {
      border-color: #c4a47c;
    }
    .option-discuss .option-text {
      color: #8c6c55;
      font-weight: 600;
    }

    /* Button container */
    .btn-container {
      display: flex;
      gap: 16px;
      padding: 10px 52px 40px;
      width: 100%;
    }

    /* Button styles */
    .btn {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-back {
      background: #f5ede6;
      color: #8c6c55;
      border: 1px solid #ede3d8;
    }

    .btn-back:hover {
      background: #efe5db;
      transform: translateY(-1px);
    }

    .btn-continue {
      background: #8c6c55;
      color: #fff;
    }

    .btn-continue:hover:not(:disabled) {
      background: #7a5b46;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(140, 108, 85, 0.25);
    }

    .btn-continue:disabled {
      background: #d4c5b8;
      cursor: not-allowed;
      transform: none;
    }

    /* Close button */
    .close {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 26px;
      cursor: pointer;
      color: #b8a694;
      transition: all 0.2s;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #f8f3ee;
      z-index: 20;
    }
    .close:hover {
      color: #8c6c55;
      background: #efe5db;
      transform: rotate(90deg);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .options-grid {
        padding: 0 24px 20px;
      }
      .btn-container {
        padding: 10px 24px 32px;
        gap: 12px;
      }
      h2 {
        font-size: 20px;
      }
      .btn {
        padding: 12px 16px;
        font-size: 14px;
      }
      .option-text {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="budget-selector">
      <!-- <span class="close" id="closeBtn">&times;</span> -->

      <!-- Progress bar -->
      <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
      </div>

      <!-- Header -->
      <div class="options-grid">
        <h2>What's your budget for the project?</h2>
      </div>

      <!-- Budget Options -->
      <div class="options-grid" id="optionsGrid">
        <label class="option" data-value="Upto Rs.10 Lakhs">
          <input type="radio" name="budget" value="Upto ₹10 Lakhs">
          <span class="option-text">Upto ₹10 Lakhs</span>
        </label>

        <label class="option" data-value="Rs.10 Lakhs - 20 Lakhs per sq.ft.">
          <input type="radio" name="budget" value="₹10 Lakhs - ₹20 Lakhs">
          <span class="option-text">₹10 Lakhs to ₹20 Lakhs</span>
        </label>

        <label class="option" data-value="Rs.20 Lakhs - 40 Lakhs per sq.ft.">
          <input type="radio" name="budget" value="₹20 Lakhs - ₹40 Lakhs">
          <span class="option-text">₹20 Lakhs to ₹40 Lakhs</span>
        </label>

        <label class="option" data-value="More than Rs.40 Lakhs per sq.ft.">
          <input type="radio" name="budget" value="₹40 Lakhs or more">
          <span class="option-text">₹40 Lakhs or more</span>
        </label>

        <label class="option option-discuss" data-value="discuss-with-professional">
          <input type="radio" name="budget" value="I would like to discuss with the professional">
          <span class="option-text">I would like to discuss with the professional</span>
        </label>
      </div>

      <!-- Buttons in one line -->
      <div class="btn-container">
        <button class="btn btn-back" id="backBtn">← Back</button>
        <button class="btn btn-continue" id="continueBtn" disabled>Continue →</button>
      </div>
    </div>
  </div>

  <script>
    let formData = {};
    let previousFormData = {};

    // DOM elements
    const options = document.querySelectorAll('.option');
    const continueBtn = document.getElementById('continueBtn');
    const closeBtn = document.getElementById('closeBtn');
    const backBtn = document.getElementById('backBtn');

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      continueBtn.disabled = true;
      loadPreviousFormData();
      setupEventListeners();
    });

    function loadPreviousFormData() {
      // Get data from all previous forms
      const completeData = localStorage.getItem('completeFormData');
      const areaBhkData = localStorage.getItem('areaBhkData');
      const finalData = localStorage.getItem('finalFormData');
      
      const raw = finalData || completeData || areaBhkData;
      if (raw) {
        try {
          previousFormData = JSON.parse(raw);
          // console.log("Loaded previous data:", previousFormData);
        } catch(e) { console.warn(e); }
      }

      // Also load individual step data
      const spacesData = localStorage.getItem('spacesFormData');
      const serviceData = localStorage.getItem('serviceFormData');
      const projectData = localStorage.getItem('projectType');
      
      if (spacesData) Object.assign(previousFormData, JSON.parse(spacesData));
      if (serviceData) Object.assign(previousFormData, JSON.parse(serviceData));
      if (projectData) Object.assign(previousFormData, JSON.parse(projectData));

      // Preselect budget if returning
      const savedBudget = localStorage.getItem('completeBudgetFormData');
      if (savedBudget) {
        try {
          const saved = JSON.parse(savedBudget);
          if (saved.budget) {
            const value = saved.budget;
            const option = Array.from(options).find(opt => 
              opt.querySelector('input').value === value
            );
            if (option) {
              options.forEach(opt => opt.classList.remove('selected'));
              option.classList.add('selected');
              const radio = option.querySelector('input');
              radio.checked = true;
              formData.budget = value;
              continueBtn.disabled = false;
            }
          }
        } catch(e) { console.warn(e); }
      } else if (previousFormData.budget) {
        const value = previousFormData.budget;
        const option = Array.from(options).find(opt => 
          opt.querySelector('input').value === value
        );
        if (option) {
          options.forEach(opt => opt.classList.remove('selected'));
          option.classList.add('selected');
          const radio = option.querySelector('input');
          radio.checked = true;
          formData.budget = value;
          continueBtn.disabled = false;
        }
      }
    }

    function setupEventListeners() {
      // Budget selection
      options.forEach(option => {
        option.addEventListener('click', function(e) {
          // Remove previous selection
          options.forEach(opt => opt.classList.remove('selected'));
          // Add selection to clicked option
          this.classList.add('selected');
          
          // Enable continue button
          continueBtn.disabled = false;
          
          // Store selection
          const radio = this.querySelector('input[type="radio"]');
          formData.budget = radio.value;
          
          // console.log("Budget selected:", formData.budget);
          
          // Save to localStorage immediately
          saveToLocalStorage();
        });
      });

      // Close button
      if (closeBtn) {
        closeBtn.addEventListener('click', closeModal);
      }

      // Back button
      if (backBtn) {
        backBtn.addEventListener('click', goBack);
      }
    }

    function saveToLocalStorage() {
      // Combine all forms data
      const completeFormData = {
        ...previousFormData,
        ...formData,
        timestamp: new Date().toISOString()
      };
      
      // Store complete data
      localStorage.setItem('completeBudgetFormData', JSON.stringify(completeFormData));
      localStorage.setItem('completeFormData', JSON.stringify(completeFormData));
    }

    function goBack() {
      // Go back to the area/BHK selection form
      window.location.href = 'property-size.html';
    }

    function continueToNext() {
      if (!formData.budget) return;
      
      // console.log('Budget selected:', formData);
      
      // Combine all forms data
      const completeFormData = {
        ...previousFormData,
        ...formData,
        completedAt: new Date().toISOString()
      };
      
      // Store complete data
      localStorage.setItem('completeBudgetFormData', JSON.stringify(completeFormData));
      localStorage.setItem('completeFormData', JSON.stringify(completeFormData));
      localStorage.setItem('finalFormData', JSON.stringify(completeFormData));
      
      // Redirect to the hiring likelihood form
      window.location.href = 'hiring-likelihood.html';
    }

    function closeModal() {
      // Do nothing - stay on the same page
      console.log('Close clicked - staying on page');
    }

    // Close modal when clicking outside
    document.querySelector('.container')?.addEventListener('click', function(e) {
      if (e.target === document.querySelector('.container')) {
        closeModal();
      }
    });

    // Attach continue button handler
    continueBtn.addEventListener('click', continueToNext);
  </script>
</body>
</html>
