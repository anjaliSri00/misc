<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interior Service | Verify Code</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f5f0ea;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
    }

    /* Warm gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #faf7f2 0%, #f0e8e0 100%);
      z-index: 0;
    }

    /* Subtle pattern */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(#c4a47c 0.5px, transparent 0.5px);
      background-size: 24px 24px;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 650px;
      padding: 24px;
    }

    /* Main card */
    .otp-selector {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(140, 108, 85, 0.1);
      overflow: hidden;
    }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #f0e8e0;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .progress {
      width: 95%;
      height: 100%;
      background: #8c6c55;
      border-radius: 6px;
      transition: width 0.3s ease;
    }

    /* Success badge */
    .success-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #e8f5f0;
      padding: 8px 18px;
      border-radius: 60px;
      margin-bottom: 20px;
      width: fit-content;
    }
    .success-badge .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2e7d64;
      display: inline-block;
    }
    .success-badge span {
      color: #2e7d64;
      font-size: 13px;
      font-weight: 500;
    }

    h2 {
      font-size: 28px;
      font-weight: 700;
      color: #2c241a;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #9b8978;
      margin-bottom: 28px;
      font-size: 15px;
    }

    /* OTP Inputs */
    .otp-container {
      padding: 0 32px 20px;
    }

    .inputs {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 10px 0 24px;
      flex-wrap: wrap;
    }

    .inputs input {
      width: 65px;
      height: 70px;
      text-align: center;
      font-size: 28px;
      font-weight: 600;
      border-radius: 16px;
      border: 1.5px solid #ede3d8;
      outline: none;
      background: #ffffff;
      color: #2c241a;
      font-family: monospace;
      transition: all 0.2s ease;
    }

    .inputs input:focus {
      border-color: #8c6c55;
      box-shadow: 0 0 0 3px rgba(140, 108, 85, 0.15);
    }

    .inputs input::-webkit-inner-spin-button,
    .inputs input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* Muted text */
    .muted {
      text-align: center;
      color: #9b8978;
      font-size: 14px;
    }

    .link {
      color: #8c6c55;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }

    .link:hover {
      text-decoration: underline;
    }

    /* Error message */
    .error-msg {
      text-align: center;
      color: #b91c1c;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    /* Loading state */
    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
    }

    .loading.show {
      display: flex;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #ede3d8;
      border-top-color: #8c6c55;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Button container */
    .btn-container {
      display: flex;
      gap: 16px;
      padding: 20px 32px 36px;
      width: 100%;
    }

    /* Button styles */
    .btn {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-back {
      background: #f5ede6;
      color: #8c6c55;
      border: 1px solid #ede3d8;
    }

    .btn-back:hover {
      background: #efe5db;
      transform: translateY(-1px);
    }

    .btn-continue {
      background: #8c6c55;
      color: #fff;
    }

    .btn-continue:hover:not(:disabled) {
      background: #7a5b46;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(140, 108, 85, 0.25);
    }

    .btn-continue:disabled {
      background: #d4c5b8;
      cursor: not-allowed;
      transform: none;
    }

    /* Close button */
    .close {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 26px;
      cursor: pointer;
      color: #b8a694;
      transition: all 0.2s;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #f8f3ee;
      z-index: 20;
    }
    .close:hover {
      color: #8c6c55;
      background: #efe5db;
      transform: rotate(90deg);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .otp-container {
        padding: 0 20px 16px;
      }
      .btn-container {
        padding: 16px 20px 28px;
        gap: 12px;
      }
      h2 {
        font-size: 24px;
      }
      .subtitle {
        font-size: 13px;
      }
      .btn {
        padding: 12px 16px;
        font-size: 14px;
      }
      .inputs input {
        width: 48px;
        height: 56px;
        font-size: 24px;
      }
    }
  </style>
  <script src="config.js"></script>
</head>
<body>
  <div class="container">
    <div class="otp-selector">
      <!-- <span class="close" id="closeBtn">&times;</span> -->

      <!-- Progress bar -->
      <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
      </div>

      <!-- Success Badge -->
      <div class="otp-container">
        <div class="success-badge">
          <span class="dot"></span>
          <span>✓ Request posted successfully</span>
        </div>

        <h2>🔐 Verify your account</h2>
        <div class="subtitle">Enter the 6-digit code sent to <strong id="maskedNumber">******</strong></div>

        <!-- OTP Inputs -->
        <div class="inputs">
          <input type="text" inputmode="numeric" maxlength="1" id="d1" class="otp-input">
          <input type="text" inputmode="numeric" maxlength="1" id="d2" class="otp-input">
          <input type="text" inputmode="numeric" maxlength="1" id="d3" class="otp-input">
          <input type="text" inputmode="numeric" maxlength="1" id="d4" class="otp-input">
          <input type="text" inputmode="numeric" maxlength="1" id="d5" class="otp-input">
          <input type="text" inputmode="numeric" maxlength="1" id="d6" class="otp-input">
        </div>

        <!-- Resend Section -->
        <div class="muted">
          Didn't receive a code? 
          <span id="resend" class="link">Resend</span>
          <span id="countdown"></span>
        </div>
        
        <div class="muted" style="margin-top: 8px;">
          We've also sent a login link to your email
        </div>

        <!-- Error message -->
        <div id="errorMsg" class="error-msg">
          ⚠️ Invalid verification code. Please try again.
        </div>

        <!-- Loading indicator -->
        <div id="loading" class="loading">
          <div class="spinner"></div>
          <span>Verifying code...</span>
        </div>
      </div>

      <!-- Buttons -->
      <div class="btn-container">
        <button class="btn btn-back" id="backBtn">← Back</button>
        <button class="btn btn-continue" id="continueBtn" disabled>Verify →</button>
      </div>
    </div>
  </div>

  <script>
    let completeFormData = {};
    let previousFormData = {};

    // DOM elements
    const inputs = ['d1', 'd2', 'd3', 'd4', 'd5', 'd6'].map(id => document.getElementById(id));
    const continueBtn = document.getElementById('continueBtn');
    const backBtn = document.getElementById('backBtn');
    const closeBtn = document.getElementById('closeBtn');
    const resendBtn = document.getElementById('resend');
    const countdownSpan = document.getElementById('countdown');
    const errorMsg = document.getElementById('errorMsg');
    const loadingEl = document.getElementById('loading');
    const maskedNumberSpan = document.getElementById('maskedNumber');

    // Helper functions
    function getCode() {
      return inputs.map(input => input.value).join('');
    }

    function toggleContinue() {
      const code = getCode();
      continueBtn.disabled = code.length !== 6;
      if (errorMsg) errorMsg.classList.remove('show');
    }

    function focusNext(currentIndex) {
      if (currentIndex < inputs.length - 1 && inputs[currentIndex].value.length === 1) {
        inputs[currentIndex + 1].focus();
      }
    }

    function focusPrev(currentIndex) {
      if (currentIndex > 0 && !inputs[currentIndex].value) {
        inputs[currentIndex - 1].focus();
      }
    }

    // Format phone number for display
    function maskPhoneNumber(phone) {
      if (!phone) return '******';
      const digits = phone.replace(/\D/g, '');
      if (digits.length >= 10) {
        return `+91 ${digits.slice(0, 5)}****${digits.slice(-2)}`;
      }
      return digits.slice(-6).padStart(6, '*');
    }

    // Load data from previous steps
    function loadFormData() {
      const raw = localStorage.getItem('finalSubmissionData') || 
                  localStorage.getItem('completePhoneFormData') || 
                  localStorage.getItem('completeEmailFormData') ||
                  localStorage.getItem('completeFormData');
      if (raw) {
        try {
          completeFormData = JSON.parse(raw);
          if (completeFormData.phone) {
            maskedNumberSpan.textContent = maskPhoneNumber(completeFormData.phone);
          }
        } catch(e) { console.warn(e); }
      }
      
      // Also try to load from completeFormData
      const completeData = localStorage.getItem('completeFormData');
      if (completeData && !completeFormData.phone) {
        try {
          const parsed = JSON.parse(completeData);
          if (parsed.phone) {
            completeFormData.phone = parsed.phone;
            maskedNumberSpan.textContent = maskPhoneNumber(parsed.phone);
          }
        } catch(e) {}
      }
    }

    // Setup OTP input fields
    function setupInputs() {
      inputs.forEach((input, idx) => {
        if (!input) return;
        
        input.addEventListener('input', (e) => {
          e.target.value = e.target.value.replace(/\D/g, '').slice(0, 1);
          toggleContinue();
          if (e.target.value && idx < inputs.length - 1) {
            inputs[idx + 1].focus();
          }
        });
        
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace') {
            if (!e.target.value && idx > 0) {
              inputs[idx - 1].focus();
              inputs[idx - 1].value = '';
              toggleContinue();
            }
          }
        });
        
        input.addEventListener('focus', (e) => {
          e.target.select();
        });
      });

      // Paste handler for entire code
      if (inputs[0]) {
        inputs[0].addEventListener('paste', (e) => {
          const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
          if (text) {
            e.preventDefault();
            for (let i = 0; i < inputs.length && i < text.length; i++) {
              if (inputs[i]) inputs[i].value = text[i];
            }
            if (text.length === 6 && inputs[5]) inputs[5].focus();
            toggleContinue();
          }
        });
      }
    }

    // OTP API call
    async function callOtpApi(payload) {
      if (typeof CONFIG === 'undefined' || !CONFIG.API?.BASE_URL) {
        console.warn('CONFIG not found, using mock OTP verification');
        // Mock mode - accept any 6-digit code for testing
        return { meta: { status: 200 }, data: {} };
      }
      const res = await fetch(`${CONFIG.API.BASE_URL}/api/v1/common/otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      return await res.json();
    }

    // Resend OTP
    async function resendOtp() {
      if (!completeFormData.phone) {
        alert('Phone number not found. Please go back and try again.');
        return;
      }

      try {
        loadingEl.classList.add('show');
        const response = await callOtpApi({
          mobile: completeFormData.phone,
          action: "generate"
        });

        loadingEl.classList.remove('show');

        if (response.meta?.status === 200) {
          localStorage.setItem("otp_session_id", response.data.session_id);
          alert("✓ OTP resent successfully!");
          startResendTimer();
        } else {
          alert("Failed to resend OTP. Please try again.");
        }
      } catch (err) {
        loadingEl.classList.remove('show');
        console.error(err);
        alert("Server error. Please check your connection.");
      }
    }

    // Resend timer
    let resendTimer = null;
    function startResendTimer() {
      let seconds = 30;
      if (countdownSpan) {
        countdownSpan.textContent = `(00:${String(seconds).padStart(2, '0')})`;
      }
      if (resendBtn) {
        resendBtn.style.pointerEvents = 'none';
        resendBtn.style.opacity = '0.6';
      }
      
      if (resendTimer) clearInterval(resendTimer);
      resendTimer = setInterval(() => {
        seconds--;
        if (countdownSpan) {
          countdownSpan.textContent = `(00:${String(seconds).padStart(2, '0')})`;
        }
        if (seconds <= 0) {
          clearInterval(resendTimer);
          if (countdownSpan) countdownSpan.textContent = '';
          if (resendBtn) {
            resendBtn.style.pointerEvents = 'auto';
            resendBtn.style.opacity = '1';
          }
        }
      }, 1000);
    }

    // Setup resend functionality
    function setupResend() {
      startResendTimer();
      if (resendBtn) {
        resendBtn.addEventListener('click', (e) => {
          e.preventDefault();
          if (resendBtn.style.pointerEvents !== 'none') {
            resendOtp();
          }
        });
      }
    }

    // Verify OTP
    async function verify() {
      const code = getCode();
      if (code.length !== 6) {
        if (errorMsg) errorMsg.textContent = '⚠️ Please enter the 6-digit verification code.';
        if (errorMsg) errorMsg.classList.add('show');
        return;
      }

      const session_id = localStorage.getItem("otp_session_id");
      const phone = completeFormData.phone;

      if (!phone) {
        if (errorMsg) errorMsg.textContent = '⚠️ Phone number not found. Please go back.';
        if (errorMsg) errorMsg.classList.add('show');
        return;
      }

      try {
        if (continueBtn) continueBtn.disabled = true;
        if (loadingEl) loadingEl.classList.add('show');
        if (errorMsg) errorMsg.classList.remove('show');

        const response = await callOtpApi({
          mobile: phone,
          action: "verify",
          otp: code,
          session_id: session_id
        });

        if (loadingEl) loadingEl.classList.remove('show');

        if (response.meta?.status === 200) {
          // OTP verified successfully
          localStorage.setItem("otp_verified", "true");
          localStorage.setItem("user_verified", "true");
          
          // Save verification status
          const allData = JSON.parse(localStorage.getItem('completeFormData') || '{}');
          allData.otpVerified = true;
          allData.verifiedAt = new Date().toISOString();
          localStorage.setItem('completeFormData', JSON.stringify(allData));
          
          window.location.href = 'name.html';
        } else {
          if (errorMsg) {
            errorMsg.textContent = '⚠️ Invalid verification code. Please try again.';
            errorMsg.classList.add('show');
          }
          if (continueBtn) continueBtn.disabled = false;
          // Clear inputs on error
          inputs.forEach(input => { if (input) input.value = ''; });
          if (inputs[0]) inputs[0].focus();
        }
      } catch (err) {
        if (loadingEl) loadingEl.classList.remove('show');
        if (continueBtn) continueBtn.disabled = false;
        console.error(err);
        if (errorMsg) {
          errorMsg.textContent = '⚠️ Server error. Please check your connection.';
          errorMsg.classList.add('show');
        }
      }
    }

    // Navigation
    function goBack() {
      window.location.href = 'phone.html';
    }

    function closeModal() {
      console.log('Close clicked - staying on page');
    }

    // Auto-submit when all digits entered
    function setupAutoSubmit() {
      const checkAndSubmit = () => {
        const code = getCode();
        if (code.length === 6 && continueBtn && !continueBtn.disabled) {
          verify();
        }
      };
      
      inputs.forEach(input => {
        if (input) {
          input.addEventListener('input', checkAndSubmit);
        }
      });
    }

    // Event listeners
    function setupEventListeners() {
      if (continueBtn) {
        continueBtn.addEventListener('click', verify);
      }
      
      if (backBtn) {
        backBtn.addEventListener('click', goBack);
      }
      
      if (closeBtn) {
        closeBtn.addEventListener('click', closeModal);
      }
      
      // Close on outside click
      document.querySelector('.container')?.addEventListener('click', function(e) {
        if (e.target === document.querySelector('.container')) {
          closeModal();
        }
      });
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadFormData();
      setupInputs();
      setupResend();
      setupAutoSubmit();
      setupEventListeners();
      toggleContinue();
      
      // Focus first input
      if (inputs[0]) inputs[0].focus();
    });
  </script>
</body>
</html>
