<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="config.js"></script>
  <title>Interior Service | Your Name</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f5f0ea;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #faf7f2 0%, #f0e8e0 100%);
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(#c4a47c 0.5px, transparent 0.5px);
      background-size: 24px 24px;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 650px;
      padding: 24px;
    }

    .name-selector {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(140, 108, 85, 0.1);
      overflow: hidden;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #f0e8e0;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .progress {
      width: 100%;
      height: 100%;
      background: #8c6c55;
      border-radius: 6px;
      transition: width 0.3s ease;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      color: #2c241a;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #9b8978;
      margin-bottom: 28px;
      font-size: 15px;
    }

    .form-container {
      padding: 0 32px 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #5c4a3a;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
      border: 1.5px solid #ede3d8;
      border-radius: 16px;
      background: #ffffff;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .input-wrapper:hover {
      border-color: #c4a47c;
    }

    .input-wrapper:focus-within {
      border-color: #8c6c55;
      box-shadow: 0 0 0 3px rgba(140, 108, 85, 0.1);
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: #b8a694;
      z-index: 2;
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      border: none;
      background: transparent;
      font-size: 16px;
      color: #2c241a;
      outline: none;
      font-family: inherit;
    }

    .form-input::placeholder {
      color: #c4b8a8;
    }

    .checkbox-wrapper {
      margin-top: 20px;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .checkbox input {
      width: 20px;
      height: 20px;
      accent-color: #8c6c55;
      cursor: pointer;
    }

    .checkbox span {
      font-size: 14px;
      color: #5c4a3a;
    }

    .terms {
      text-align: center;
      color: #b8a694;
      margin-top: 18px;
      font-size: 12px;
    }

    .terms a {
      color: #8c6c55;
      text-decoration: none;
    }

    .terms a:hover {
      text-decoration: underline;
    }

    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
    }

    .loading.show {
      display: flex;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #ede3d8;
      border-top-color: #8c6c55;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-msg {
      color: #b91c1c;
      font-size: 12px;
      margin-top: 8px;
      margin-left: 12px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .btn-container {
      display: flex;
      gap: 16px;
      padding: 20px 32px 36px;
      width: 100%;
    }

    .btn {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-back {
      background: #f5ede6;
      color: #8c6c55;
      border: 1px solid #ede3d8;
    }

    .btn-back:hover {
      background: #efe5db;
      transform: translateY(-1px);
    }

    .btn-back:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-submit {
      background: #8c6c55;
      color: #fff;
    }

    .btn-submit:hover:not(:disabled) {
      background: #7a5b46;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(140, 108, 85, 0.25);
    }

    .btn-submit:disabled {
      background: #d4c5b8;
      cursor: not-allowed;
      transform: none;
    }

    @media (max-width: 600px) {
      .form-container {
        padding: 0 20px 16px;
      }
      .btn-container {
        padding: 16px 20px 28px;
        gap: 12px;
      }
      h1 {
        font-size: 26px;
      }
      .subtitle {
        font-size: 13px;
      }
      .btn {
        padding: 12px 16px;
        font-size: 14px;
      }
      .form-input {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="name-selector">
      <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
      </div>

      <div class="form-container">
        <h1>👋 What's your name?</h1>
        <div class="subtitle">This helps us personalize your experience</div>
      </div>

      <div class="form-container">
        <label class="form-label">Full name</label>
        <div class="input-wrapper">
          <span class="input-icon">✍️</span>
          <input id="nameInput" type="text" class="form-input" placeholder="Enter your full name" autocomplete="name" />
        </div>
        <div id="nameError" class="error-msg">Please enter your name (at least 2 characters)</div>
      </div>

      <div class="form-container checkbox-wrapper">
        <label class="checkbox">
          <input id="marketingOptIn" type="checkbox" checked />
          <span>📧 I'm happy to receive occasional updates and design inspiration</span>
        </label>
      </div>

      <div class="terms">
        By continuing, you agree to our <a href="#" target="_blank">Terms & Conditions</a> and <a href="#">Privacy Policy</a>
      </div>

      <div id="loading" class="loading">
        <div class="spinner"></div>
        <span>Submitting your request...</span>
      </div>

      <div class="btn-container">
        <button class="btn btn-back" id="backBtn">← Back</button>
        <button class="btn btn-submit" id="continueBtn" disabled>Submit →</button>
      </div>
    </div>
  </div>

  <script>
    let previousFormData = {};
    let allCollectedData = {};

    // DOM elements
    const nameInput = document.getElementById('nameInput');
    const continueBtn = document.getElementById('continueBtn');
    const backBtn = document.getElementById('backBtn');
    const marketingOptIn = document.getElementById('marketingOptIn');
    const nameError = document.getElementById('nameError');
    const loadingEl = document.getElementById('loading');

    function isValidName(name) {
      return name.trim().length >= 2;
    }

    function updateContinueButton() {
      const name = nameInput.value;
      const valid = isValidName(name);
      
      if (name && !valid) {
        nameError.classList.add('show');
      } else {
        nameError.classList.remove('show');
      }
      
      continueBtn.disabled = !valid;
    }

    function mergeData(target, source) {
      if (!source || typeof source !== 'object') return;
      Object.keys(source).forEach(key => {
        if (source[key] !== undefined && source[key] !== null && source[key] !== '') {
          target[key] = source[key];
        }
      });
    }

    function loadAllFormData() {
      const formDataKeys = [
        'serviceFormData',
        'projectType',
        'propertyType',
        'completeAreaFormData',
        'completeBudgetFormData',
        'completeHiringFormData',
        'locationData',
        'completeEmailFormData',
        'completePhoneFormData',
        'completeNameFormData',
        'completeFormData',
        'finalFormData'
      ];
      
      formDataKeys.forEach(key => {
        try {
          const data = localStorage.getItem(key);
          if (data) {
            const parsed = JSON.parse(data);
            mergeData(allCollectedData, parsed);
          }
        } catch (e) {
          console.warn('Failed to parse localStorage key:', key, e);
        }
      });
      
      if (allCollectedData.name && !nameInput.value) {
        nameInput.value = allCollectedData.name;
        updateContinueButton();
      }
      
      if (typeof allCollectedData.marketingOptIn === 'boolean') {
        marketingOptIn.checked = allCollectedData.marketingOptIn;
      }
      
      // console.log('Loaded all form data:', allCollectedData);
    }

    // ⭐ UPDATED MAPPING FUNCTIONS based on your data
    function mapServiceType(serviceType) {
      const mapping = {
        'Turnkey': 'Turnkey',
        'Design only': 'Design only',
      };
      return mapping[serviceType] || serviceType || 'Turnkey';
    }

    function mapProjectType(projectType) {
      const mapping = {
        'New Property': 'New Property',
        'Existing Property': 'Existing Property',
        'new property': 'New Property',
        'existing property': 'Existing Property'
      };
      return mapping[projectType] || projectType || 'New Property';
    }

    function mapPropertyType(propertyType) {
      const mapping = {
        'Office': 'Office',
        'Retail': 'Retail',
        'F & B': 'F & B',
        '1 BHK': '1 BHK',
        '2 BHK': '2 BHK',
        '3 BHK': '3 BHK',
        '4 BHK': '4 BHK',
        '5+ BHK': '5+ BHK'
      };
      return mapping[propertyType] || propertyType || '';
    }

    function cleanAreaSize(areaSize) {
      if (!areaSize) return '';
      if (typeof areaSize === 'object') {
        return areaSize.range || areaSize.display || '';
      }
      return areaSize.toString();
    }

    function mapBudget(budget) {
      const mapping = {
        'Upto ₹10 Lakhs': 'Upto ₹10 Lakhs',
        '₹10 Lakhs - ₹20 Lakhs': '₹10 Lakhs - ₹20 Lakhs',
        '₹20 Lakhs - ₹40 Lakhs': '₹20 Lakhs - ₹40 Lakhs',
        '₹40 Lakhs or more': '₹40 Lakhs or more',
        'I would like to discuss with the professional': 'Discuss with professional'
      };
      return mapping[budget] || budget || '';
    }

    function mapHiringDecision(hiringDecision) {
      const mapping = {
        "I'm ready to hire now": "I'm ready to hire now",
        "I'm likely to hire someone": "I'm likely to hire someone",
        "I'm planning and researching": "I'm planning and researching",
        'ready-to-hire-now': 'ready-to-hire-now',
        'planning-and-researching': 'planning-and-researching'
      };
      return mapping[hiringDecision] || hiringDecision || 'planning-and-researching';
    }

    // ⭐ MAIN SUBMIT FUNCTION with preventDefault
    async function submitForm(event) {
      // Prevent page reload
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      
      const name = nameInput.value.trim();
      const marketingOptInChecked = marketingOptIn.checked;
      
      if (!isValidName(name)) return;
      
      // Update collected data
      allCollectedData.name = name;
      allCollectedData.marketingOptIn = marketingOptInChecked;
      
      // Store the complete data
      localStorage.setItem('completeNameFormData', JSON.stringify(allCollectedData));
      localStorage.setItem('finalFormData', JSON.stringify(allCollectedData));
      localStorage.setItem('completeFormData', JSON.stringify(allCollectedData));
      
      // console.log('Final collected data:', allCollectedData);
      
      // Show loading state
      continueBtn.disabled = true;
      const originalText = continueBtn.textContent;
      continueBtn.textContent = 'Submitting...';
      if (backBtn) backBtn.disabled = true;
      if (loadingEl) loadingEl.classList.add('show');
      
      try {
        // ⭐ BUILD BACKEND DATA ACCORDING TO YOUR CONFIG
        let backendFormData = {};
        
        // Use CONFIG if available
        if (typeof CONFIG !== 'undefined' && CONFIG.FORM?.FIELDS) {
          for (const [backendField, config] of Object.entries(CONFIG.FORM.FIELDS)) {
            const source = config.source;
            let value = allCollectedData[source];
            
            // Apply specific mappings based on backend field
            switch(backendField) {
              case 'customer_name':
                value = name;
                break;
              case 'customer_contact':
                value = allCollectedData.phone || '';
                value = value.replace(/^\+91/, '').replace(/\D/g, '').slice(0, 10);
                break;
              case 'customer_email':
                value = allCollectedData.email || '';
                break;
              case 'city':
                value = allCollectedData.city || '';
                break;
              case 'state':
                value = allCollectedData.state || '';
                break;
              case 'pincode':
                value = allCollectedData.pincode || '';
                break;
              case 'type_of_space':
                // Priority: type_of_space > bhk_type > bhkConfiguration
                value = allCollectedData.type_of_space || 
                        allCollectedData.bhk_type || 
                        allCollectedData.bhkConfiguration || 
                        '';
                break;
              case 'type_of_service':
                value = mapServiceType(allCollectedData.serviceType);
                break;
              case 'property_type':
                value = mapPropertyType(allCollectedData.property_type);
                break;
              case 'property_size':
                value = cleanAreaSize(allCollectedData.propertyArea || allCollectedData.property_size);
                break;
              case 'project_type':
                value = mapProjectType(allCollectedData.projectType);
                break;
              case 'range_label':
                value = mapBudget(allCollectedData.budget);
                break;
              case 'hiring_decision':
                value = mapHiringDecision(allCollectedData.hiringDecision);
                break;
              case 'description':
                value = allCollectedData.description || '';
                break;
              case 'bhk_configuration':
                value = allCollectedData.bhkConfiguration || allCollectedData.bhk_type || '';
                break;
              case 'claim_limit':
                value = config.defaultValue || 3;
                break;
              case 'admin_approval':
                value = config.defaultValue || 'pending';
                break;
              default:
                // Use value as is
                break;
            }
            
            // Only add if value exists or field is required
            if (config.required || (value !== undefined && value !== null && value !== '')) {
              backendFormData[backendField] = value;
            }
          }
        } else {
          // ⭐ FALLBACK MAPPING (if CONFIG not available)
          backendFormData = {
            customer_name: name,
            customer_contact: (allCollectedData.phone || '').replace(/\D/g, '').slice(0, 10),
            customer_email: allCollectedData.email || '',
            city: allCollectedData.city || '',
            state: allCollectedData.state || '',
            pincode: allCollectedData.pincode || '',
            type_of_space: allCollectedData.type_of_space || '',
            type_of_service: mapServiceType(allCollectedData.serviceType),
            property_type: mapPropertyType(allCollectedData.propertyType ||""),
            property_size: cleanAreaSize(allCollectedData.propertyArea || allCollectedData.property_size),
            project_type: mapProjectType(allCollectedData.projectType),
            range_label: mapBudget(allCollectedData.budget),
            hiring_decision: mapHiringDecision(allCollectedData.hiringDecision),
            description: allCollectedData.description || '',
            bhk_configuration: allCollectedData.bhkConfiguration || allCollectedData.bhk_type || '',
            claim_limit: 3,
            admin_approval: 'pending'
          };
        }
        
        // console.log('✅ Final Backend Payload:', backendFormData);
        
        // Get API URL
        const apiUrl = (typeof CONFIG !== 'undefined' && CONFIG.API?.BASE_URL) 
          ? `${CONFIG.API.BASE_URL}${CONFIG.API.ENDPOINTS?.LEADS?.FORM || '/api/v1/lead/data'}`
          : 'http://localhost:8000/api/v1/lead/data';
        
        // console.log('📡 Sending to:', apiUrl);
        
        // Make API call
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify(backendFormData)
        });
        
        // console.log('📊 Response status:', response.status);
        
        let responseData;
        const contentType = response.headers.get('content-type');
        if (contentType && contentType.includes('application/json')) {
          responseData = await response.json();
        } else {
          responseData = await response.text();
        }
        
        // console.log('📨 Response data:', responseData);
        
        if (response.ok) {
          // console.log('✅ Form submitted successfully!');
          
          // Store submission status
          localStorage.setItem('formSubmissionStatus', JSON.stringify({
            submitted: true,
            timestamp: new Date().toISOString(),
            leadId: responseData?.id || responseData?.lead_id || null
          }));
          
          // Redirect to success page
          const redirectUrl = (typeof CONFIG !== 'undefined' && CONFIG.UI?.SUCCESS_REDIRECT) 
            ? CONFIG.UI.SUCCESS_REDIRECT 
            : 'thank-you.html';
          
          // console.log('🚀 Redirecting to:', redirectUrl);
          window.location.href = redirectUrl;
        } else {
          let errorMessage = 'Submission failed';
          if (responseData && typeof responseData === 'object') {
            errorMessage = responseData.message || responseData.error || JSON.stringify(responseData);
          } else if (typeof responseData === 'string') {
            errorMessage = responseData;
          }
          
          throw new Error(errorMessage);
        }
      } catch (error) {
        console.error('❌ Error:', error);
        alert('Error submitting form: ' + error.message);
        
        // Reset button state
        continueBtn.disabled = false;
        continueBtn.textContent = 'Submit →';
        if (backBtn) backBtn.disabled = false;
        if (loadingEl) loadingEl.classList.remove('show');
      }
    }

    function goBack(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      
      const name = nameInput.value.trim();
      if (name) {
        allCollectedData.name = name;
        allCollectedData.marketingOptIn = marketingOptIn.checked;
        localStorage.setItem('completeNameFormData', JSON.stringify(allCollectedData));
      }
      window.location.href = 'otp.html';
    }

    function setupEventListeners() {
      if (nameInput) {
        nameInput.addEventListener('input', updateContinueButton);
      }
      
      if (continueBtn) {
        continueBtn.removeEventListener('click', submitForm);
        continueBtn.addEventListener('click', submitForm);
      }
      
      if (backBtn) {
        backBtn.removeEventListener('click', goBack);
        backBtn.addEventListener('click', goBack);
      }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadAllFormData();
      updateContinueButton();
      setupEventListeners();
      
      if (nameInput) nameInput.focus();
    });
  </script>
</body>
</html>
