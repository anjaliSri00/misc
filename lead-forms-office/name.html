<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="config.js"></script>
  <title>Interior Service | Your Name</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f5f0ea;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
    }

    /* Warm gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #faf7f2 0%, #f0e8e0 100%);
      z-index: 0;
    }

    /* Subtle pattern */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(#c4a47c 0.5px, transparent 0.5px);
      background-size: 24px 24px;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 650px;
      padding: 24px;
    }

    /* Main card */
    .name-selector {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(140, 108, 85, 0.1);
      overflow: hidden;
    }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #f0e8e0;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .progress {
      width: 100%;
      height: 100%;
      background: #8c6c55;
      border-radius: 6px;
      transition: width 0.3s ease;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      color: #2c241a;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #9b8978;
      margin-bottom: 28px;
      font-size: 15px;
    }

    /* Form container */
    .form-container {
      padding: 0 32px 20px;
    }

    /* Label */
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #5c4a3a;
      margin-bottom: 8px;
    }

    /* Input wrapper */
    .input-wrapper {
      position: relative;
      border: 1.5px solid #ede3d8;
      border-radius: 16px;
      background: #ffffff;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .input-wrapper:hover {
      border-color: #c4a47c;
    }

    .input-wrapper:focus-within {
      border-color: #8c6c55;
      box-shadow: 0 0 0 3px rgba(140, 108, 85, 0.1);
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: #b8a694;
      z-index: 2;
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      border: none;
      background: transparent;
      font-size: 16px;
      color: #2c241a;
      outline: none;
      font-family: inherit;
    }

    .form-input::placeholder {
      color: #c4b8a8;
    }

    /* Checkbox */
    .checkbox-wrapper {
      margin-top: 20px;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .checkbox input {
      width: 20px;
      height: 20px;
      accent-color: #8c6c55;
      cursor: pointer;
    }

    .checkbox span {
      font-size: 14px;
      color: #5c4a3a;
    }

    /* Terms */
    .terms {
      text-align: center;
      color: #b8a694;
      margin-top: 18px;
      font-size: 12px;
    }

    .terms a {
      color: #8c6c55;
      text-decoration: none;
    }

    .terms a:hover {
      text-decoration: underline;
    }

    /* Loading state */
    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
    }

    .loading.show {
      display: flex;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #ede3d8;
      border-top-color: #8c6c55;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error message */
    .error-msg {
      color: #b91c1c;
      font-size: 12px;
      margin-top: 8px;
      margin-left: 12px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    /* Button container */
    .btn-container {
      display: flex;
      gap: 16px;
      padding: 20px 32px 36px;
      width: 100%;
    }

    /* Button styles */
    .btn {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-back {
      background: #f5ede6;
      color: #8c6c55;
      border: 1px solid #ede3d8;
    }

    .btn-back:hover {
      background: #efe5db;
      transform: translateY(-1px);
    }

    .btn-back:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-submit {
      background: #8c6c55;
      color: #fff;
    }

    .btn-submit:hover:not(:disabled) {
      background: #7a5b46;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(140, 108, 85, 0.25);
    }

    .btn-submit:disabled {
      background: #d4c5b8;
      cursor: not-allowed;
      transform: none;
    }

    /* Close button */
    .close {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 26px;
      cursor: pointer;
      color: #b8a694;
      transition: all 0.2s;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #f8f3ee;
      z-index: 20;
    }
    .close:hover {
      color: #8c6c55;
      background: #efe5db;
      transform: rotate(90deg);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .form-container {
        padding: 0 20px 16px;
      }
      .btn-container {
        padding: 16px 20px 28px;
        gap: 12px;
      }
      h1 {
        font-size: 26px;
      }
      .subtitle {
        font-size: 13px;
      }
      .btn {
        padding: 12px 16px;
        font-size: 14px;
      }
      .form-input {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="name-selector">
      <!-- <span class="close" id="closeBtn">&times;</span> -->

      <!-- Progress bar -->
      <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
      </div>

      <!-- Header -->
      <div class="form-container">
        <h1>👋 What's your name?</h1>
        <div class="subtitle">This helps us personalize your experience</div>
      </div>

      <!-- Name Input -->
      <div class="form-container">
        <label class="form-label">Full name</label>
        <div class="input-wrapper">
          <span class="input-icon">✍️</span>
          <input id="nameInput" type="text" class="form-input" placeholder="Enter your full name" autocomplete="name" />
        </div>
        <div id="nameError" class="error-msg">Please enter your name (at least 2 characters)</div>
      </div>

      <!-- Marketing Checkbox -->
      <div class="form-container checkbox-wrapper">
        <label class="checkbox">
          <input id="marketingOptIn" type="checkbox" checked />
          <span>📧 I'm happy to receive occasional updates and design inspiration</span>
        </label>
      </div>

      <!-- Terms -->
      <div class="terms">
        By continuing, you agree to our <a href="#" target="_blank">Terms & Conditions</a> and <a href="#">Privacy Policy</a>
      </div>

      <!-- Loading indicator -->
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <span>Submitting your request...</span>
      </div>

      <!-- Buttons -->
      <div class="btn-container">
        <button class="btn btn-back" id="backBtn">← Back</button>
        <button class="btn btn-submit" id="continueBtn" disabled>Submit →</button>
      </div>
    </div>
  </div>

  <script>
    let previousFormData = {};
    let allCollectedData = {};

    // DOM elements
    const nameInput = document.getElementById('nameInput');
    const continueBtn = document.getElementById('continueBtn');
    const backBtn = document.getElementById('backBtn');
    const closeBtn = document.getElementById('closeBtn');
    const marketingOptIn = document.getElementById('marketingOptIn');
    const nameError = document.getElementById('nameError');
    const loadingEl = document.getElementById('loading');

    // Helper function to validate name
    function isValidName(name) {
      return name.trim().length >= 2;
    }

    function updateContinueButton() {
      const name = nameInput.value;
      const valid = isValidName(name);
      
      if (name && !valid) {
        nameError.classList.add('show');
      } else {
        nameError.classList.remove('show');
      }
      
      continueBtn.disabled = !valid;
    }

    // Helper function to merge objects
    function mergeData(target, source) {
      if (!source || typeof source !== 'object') return;
      Object.keys(source).forEach(key => {
        if (source[key] !== undefined && source[key] !== null && source[key] !== '') {
          target[key] = source[key];
        }
      });
    }

    // Load all form data from localStorage
    function loadAllFormData() {
      const formDataKeys = [
        'serviceFormData',
        'projectType',
        'propertyType',
        'completeAreaFormData',
        'completeBudgetFormData',
        'completeHiringFormData',
        'locationData',
        'completeEmailFormData',
        'completePhoneFormData',
        'completeNameFormData',
        'completeFormData',
        'finalFormData'
      ];
      
      formDataKeys.forEach(key => {
        try {
          const data = localStorage.getItem(key);
          if (data) {
            const parsed = JSON.parse(data);
            mergeData(allCollectedData, parsed);
          }
        } catch (e) {
          console.warn('Failed to parse localStorage key:', key, e);
        }
      });
      
      // Load saved name if exists
      if (allCollectedData.name && !nameInput.value) {
        nameInput.value = allCollectedData.name;
        updateContinueButton();
      }
      
      if (typeof allCollectedData.marketingOptIn === 'boolean') {
        marketingOptIn.checked = allCollectedData.marketingOptIn;
      }
      
      console.log('Loaded all form data:', allCollectedData);
    }

    // Helper functions for mapping
    function mapServiceType(serviceType) {
      const mapping = {
        'complete project': 'complete project',
        'design only': 'design only',
        'supervision only': 'supervision only',
        'Design only': 'design only',
        'Design and build': 'design and build',
        'Build only': 'build only'
      };
      return mapping[serviceType] || serviceType || 'complete project';
    }

    function mapProjectType(projectType) {
      const mapping = {
        'New Property': 'new property',
        'Existing Property': 'existing property',
        'Other': 'other'
      };
      return mapping[projectType] || projectType || 'new property';
    }

    function mapPropertyType(propertyType) {
      const mapping = {
        'House': 'house',
        'Flat': 'flat',
        'Other': 'other',
        '1 BHK': '1 bhk',
        '2 BHK': '2 bhk',
        '3 BHK': '3 bhk',
        '4 BHK': '4 bhk',
        '5 BHK': '5 bhk',
        '5+ BHK': '5+ bhk'
      };
      return mapping[propertyType] || propertyType || '';
    }

    function cleanAreaSize(areaSize) {
      if (!areaSize) return '';
      // Extract the range label if it's from preset
      if (typeof areaSize === 'object') {
        return areaSize.range || areaSize.display || '';
      }
      return areaSize.toString();
    }

    function cleanBudget(budget) {
      if (!budget) return '';
      if (budget.includes('discuss-with-professional') || budget.includes('discuss with professional')) {
        return 'discuss with professional';
      }
      return budget;
    }

    // Submit form to backend
    async function submitForm() {
      const name = nameInput.value.trim();
      const marketingOptInChecked = marketingOptIn.checked;
      
      if (!isValidName(name)) return;
      
      // Update collected data
      allCollectedData.name = name;
      allCollectedData.marketingOptIn = marketingOptInChecked;
      
      // Store the complete data
      localStorage.setItem('completeNameFormData', JSON.stringify(allCollectedData));
      localStorage.setItem('finalFormData', JSON.stringify(allCollectedData));
      localStorage.setItem('completeFormData', JSON.stringify(allCollectedData));
      
      console.log('Final collected data:', allCollectedData);
      
      // Show loading state
      continueBtn.disabled = true;
      const originalText = continueBtn.textContent;
      continueBtn.textContent = 'Submitting...';
      if (backBtn) backBtn.disabled = true;
      if (loadingEl) loadingEl.classList.add('show');
      
      try {
        // Build the final data object for backend
        const finalData = {
          name: name,
          phone: allCollectedData.phone || '',
          email: allCollectedData.email || '',
          city: allCollectedData.city || '',
          state: allCollectedData.state || '',
          pincode: allCollectedData.pincode || '',
          serviceType: allCollectedData.serviceType || '',
          projectType: allCollectedData.projectType || '',
          propertyType: allCollectedData.propertyType || allCollectedData.selectedBHK || '',
          areaSize: allCollectedData.propertyArea?.range || allCollectedData.areaSize || '',
          budget: allCollectedData.budget || '',
          hiringDecision: allCollectedData.hiringDecision || '',
          marketingOptIn: marketingOptInChecked
        };
        
        console.log('Final data before mapping:', finalData);
        
        // Map to backend fields using CONFIG if available
        let backendFormData = {};
        
        if (typeof CONFIG !== 'undefined' && CONFIG.FORM?.FIELDS) {
          for (const [backendField, config] of Object.entries(CONFIG.FORM.FIELDS)) {
            const source = config.source;
            let value = finalData[source];
            
            // Apply transformations for specific fields
            switch(backendField) {
              case 'type_of_service':
                value = mapServiceType(value);
                break;
              case 'project_type':
                value = mapProjectType(value);
                break;
              case 'property_type':
                value = mapPropertyType(value);
                break;
              case 'property_size':
                value = cleanAreaSize(value);
                break;
              case 'budget':
                value = cleanBudget(value);
                break;
              case 'hiring_decision':
                value = value || 'planning and researching';
                break;
              case 'customer_contact':
                value = (value || '').replace(/^\+91/, '').replace(/\D/g, '').slice(0, 10);
                break;
              case 'city':
                value = value || '';
                break;
              case 'state':
                value = value || '';
                break;
              case 'pincode':
                value = value || '';
                break;
              case 'name':
                value = name;
                break;
            }
            
            if (value !== undefined && value !== '') {
              backendFormData[backendField] = value;
            }
          }
        } else {
          // Fallback mapping if CONFIG is not available
          backendFormData = {
            name: name,
            customer_name: name,
            customer_contact: (finalData.phone || '').replace(/\D/g, '').slice(0, 10),
            email: finalData.email || '',
            city: finalData.city || '',
            state: finalData.state || '',
            pincode: finalData.pincode || '',
            type_of_service: mapServiceType(finalData.serviceType),
            project_type: mapProjectType(finalData.projectType),
            property_type: mapPropertyType(finalData.propertyType),
            property_size: cleanAreaSize(finalData.areaSize),
            budget: cleanBudget(finalData.budget),
            hiring_decision: finalData.hiringDecision || 'planning and researching',
            marketing_opt_in: marketingOptInChecked
          };
        }
        
        console.log('Backend form data:', backendFormData);
        
        // Check if we have API endpoint
        const apiUrl = (typeof CONFIG !== 'undefined' && CONFIG.API?.BASE_URL) 
          ? `${CONFIG.API.BASE_URL}${CONFIG.API.ENDPOINTS?.LEADS?.FORM || '/api/v1/leads'}`
          : null;
        
        if (apiUrl) {
          const response = await fetch(apiUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(backendFormData)
          });
          
          console.log('Response status:', response.status);
          
          if (response.ok) {
            console.log('Form submitted successfully');
            // Clear sensitive data after successful submission
            // localStorage.clear();
            
            // Redirect to success page
            const redirectUrl = (typeof CONFIG !== 'undefined' && CONFIG.UI?.SUCCESS_REDIRECT) 
              ? CONFIG.UI.SUCCESS_REDIRECT 
              : 'thank-you.html';
            window.location.href = redirectUrl;
          } else {
            let errorMessage = 'Unknown error';
            try {
              const errorData = await response.json();
              errorMessage = errorData.message || JSON.stringify(errorData);
            } catch (e) {
              errorMessage = `HTTP ${response.status}: ${response.statusText}`;
            }
            
            console.error('Server error:', errorMessage);
            alert('Error submitting form: ' + errorMessage);
            
            // Reset button state
            continueBtn.disabled = false;
            continueBtn.textContent = originalText;
            if (backBtn) backBtn.disabled = false;
            if (loadingEl) loadingEl.classList.remove('show');
          }
        } else {
          // Mock success for testing
          console.log('API not configured - mock submission successful');
          console.log('Mock data:', backendFormData);
          alert('Demo: Form submitted successfully! (API not configured)');
          
          // Reset button state
          continueBtn.disabled = false;
          continueBtn.textContent = originalText;
          if (backBtn) backBtn.disabled = false;
          if (loadingEl) loadingEl.classList.remove('show');
          
          // For demo, redirect to thank you
          // window.location.href = 'thank-you.html';
        }
      } catch (error) {
        console.error('Error submitting form:', error);
        alert('Network error. Please check your connection and try again.');
        
        // Reset button state
        continueBtn.disabled = false;
        continueBtn.textContent = originalText;
        if (backBtn) backBtn.disabled = false;
        if (loadingEl) loadingEl.classList.remove('show');
      }
    }

    function goBack() {
      // Save current name before going back
      const name = nameInput.value.trim();
      if (name) {
        allCollectedData.name = name;
        allCollectedData.marketingOptIn = marketingOptIn.checked;
        localStorage.setItem('completeNameFormData', JSON.stringify(allCollectedData));
      }
      window.location.href = 'otp.html';
    }

    function closeModal() {
      console.log('Close clicked - staying on page');
    }

    // Setup event listeners
    function setupEventListeners() {
      if (nameInput) {
        nameInput.addEventListener('input', updateContinueButton);
      }
      
      if (continueBtn) {
        continueBtn.addEventListener('click', submitForm);
      }
      
      if (backBtn) {
        backBtn.addEventListener('click', goBack);
      }
      
      if (closeBtn) {
        closeBtn.addEventListener('click', closeModal);
      }
      
      // Close on outside click
      document.querySelector('.container')?.addEventListener('click', function(e) {
        if (e.target === document.querySelector('.container')) {
          closeModal();
        }
      });
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadAllFormData();
      updateContinueButton();
      setupEventListeners();
      
      // Focus on name input
      if (nameInput) nameInput.focus();
    });
  </script>
</body>
</html>
