<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interior Service | Email Address</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f5f0ea;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
    }

    /* Warm gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #faf7f2 0%, #f0e8e0 100%);
      z-index: 0;
    }

    /* Subtle pattern */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(#c4a47c 0.5px, transparent 0.5px);
      background-size: 24px 24px;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 600px;
      padding: 24px;
    }

    /* Main card */
    .email-selector {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(140, 108, 85, 0.1);
      overflow: hidden;
    }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #f0e8e0;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .progress {
      width: 70%;
      height: 100%;
      background: #8c6c55;
      border-radius: 6px;
      transition: width 0.3s ease;
    }

    h2 {
      font-size: 24px;
      font-weight: 700;
      color: #2c241a;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #9b8978;
      margin-bottom: 28px;
      font-size: 14px;
    }

    /* Form container */
    .form-container {
      padding: 0 32px 20px;
    }

    /* Input wrapper */
    .input-wrapper {
      position: relative;
      border: 1.5px solid #ede3d8;
      border-radius: 16px;
      background: #ffffff;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .input-wrapper:hover {
      border-color: #c4a47c;
    }

    .input-wrapper:focus-within {
      border-color: #8c6c55;
      box-shadow: 0 0 0 3px rgba(140, 108, 85, 0.1);
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: #b8a694;
      z-index: 2;
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      border: none;
      background: transparent;
      font-size: 15px;
      color: #2c241a;
      outline: none;
      font-family: inherit;
    }

    .form-input::placeholder {
      color: #c4b8a8;
    }

    /* Error message */
    .error {
      color: #b91c1c;
      font-size: 12px;
      margin-top: 8px;
      margin-left: 12px;
      display: none;
      align-items: center;
      gap: 6px;
    }

    .error.show {
      display: flex;
    }

    /* Button container */
    .btn-container {
      display: flex;
      gap: 16px;
      padding: 20px 32px 36px;
      width: 100%;
    }

    /* Button styles */
    .btn {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-back {
      background: #f5ede6;
      color: #8c6c55;
      border: 1px solid #ede3d8;
    }

    .btn-back:hover {
      background: #efe5db;
      transform: translateY(-1px);
    }

    .btn-continue {
      background: #8c6c55;
      color: #fff;
    }

    .btn-continue:hover:not(:disabled) {
      background: #7a5b46;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(140, 108, 85, 0.25);
    }

    .btn-continue:disabled {
      background: #d4c5b8;
      cursor: not-allowed;
      transform: none;
    }

    /* Close button */
    .close {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 26px;
      cursor: pointer;
      color: #b8a694;
      transition: all 0.2s;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #f8f3ee;
      z-index: 20;
    }
    .close:hover {
      color: #8c6c55;
      background: #efe5db;
      transform: rotate(90deg);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .form-container {
        padding: 0 20px 16px;
      }
      .btn-container {
        padding: 16px 20px 28px;
        gap: 12px;
      }
      h2 {
        font-size: 20px;
      }
      .btn {
        padding: 12px 16px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="email-selector">

      <!-- Progress bar -->
      <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
      </div>

      <!-- Header -->
      <div class="form-container">
        <h2>What's your email address?</h2>
        <div class="subtitle">We'll send quotes and project updates here</div>
      </div>

      <!-- Email Input -->
      <div class="form-container">
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input id="emailInput" type="email" class="form-input" placeholder="Enter your email address" autocomplete="email" />
        </div>
        <div id="error" class="error">
          <span>⚠️</span> Please enter a valid email address
        </div>
      </div>

      <!-- Buttons -->
      <div class="btn-container">
        <button class="btn btn-back" id="backBtn">← Back</button>
        <button class="btn btn-continue" id="continueBtn" disabled>Continue →</button>
      </div>
    </div>
  </div>

  <script>
    let previousFormData = {};
    let formData = {};

    // DOM elements
    const emailInput = document.getElementById('emailInput');
    const continueBtn = document.getElementById('continueBtn');
    const backBtn = document.getElementById('backBtn');
    const closeBtn = document.getElementById('closeBtn');
    const errorEl = document.getElementById('error');

    // Helper functions
    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function updateContinueButton() {
      const email = emailInput.value.trim();
      const valid = isValidEmail(email);
      errorEl.classList.toggle('show', email !== '' && !valid);
      continueBtn.disabled = !valid;
      if (valid) {
        formData.email = email;
      }
    }

    function saveToLocalStorage() {
      // Load existing complete data
      let completeData = {};
      const existingData = localStorage.getItem('completeFormData') || localStorage.getItem('finalFormData');
      if (existingData) {
        try {
          completeData = JSON.parse(existingData);
        } catch(e) {}
      }
      
      const finalData = {
        ...completeData,
        ...formData,
        email: emailInput.value.trim(),
        timestamp: new Date().toISOString()
      };
      
      localStorage.setItem('completeEmailFormData', JSON.stringify(finalData));
      localStorage.setItem('completeFormData', JSON.stringify(finalData));
    }

    function loadPreviousEmailData() {
      const saved = localStorage.getItem('completeEmailFormData');
      if (saved) {
        try {
          const savedData = JSON.parse(saved);
          if (savedData.email) {
            emailInput.value = savedData.email;
            formData.email = savedData.email;
            updateContinueButton();
          }
        } catch(e) {}
      }
      
      // Also load from completeFormData
      const completeData = localStorage.getItem('completeFormData');
      if (completeData && !emailInput.value) {
        try {
          const parsed = JSON.parse(completeData);
          if (parsed.email) {
            emailInput.value = parsed.email;
            formData.email = parsed.email;
            updateContinueButton();
          }
        } catch(e) {}
      }
    }

    function loadPreviousFormData() {
      const fromPrev = localStorage.getItem('completeMatchConfirmationData');
      const fromThis = localStorage.getItem('completeEmailFormData');
      const fromComplete = localStorage.getItem('completeFormData');
      const raw = fromThis || fromComplete || fromPrev;
      if (raw) {
        try {
          previousFormData = JSON.parse(raw);
          if (previousFormData.email && !emailInput.value) {
            emailInput.value = previousFormData.email;
            formData.email = previousFormData.email;
            updateContinueButton();
          }
        } catch(e) {}
      }
    }

    // Navigation
    function continueToNext() {
      const email = emailInput.value.trim();
      if (!isValidEmail(email)) return;
      
      formData.email = email;
      saveToLocalStorage();
      
      // Combine with all previous data
      const allData = JSON.parse(localStorage.getItem('completeFormData') || '{}');
      const finalData = {
        ...allData,
        email: email,
        completedAt: new Date().toISOString()
      };
      
      localStorage.setItem('completeFormData', JSON.stringify(finalData));
      localStorage.setItem('finalFormData', JSON.stringify(finalData));
      localStorage.setItem('completeEmailFormData', JSON.stringify(finalData));
      
      window.location.href = 'phone.html';
    }

    function goBack() {
      saveToLocalStorage();
      window.location.href = 'location.html';
    }

    function closeModal() {
      console.log('Close clicked - staying on page');
    }

    // Event listeners
    function setupEventListeners() {
      if (emailInput) {
        emailInput.addEventListener('input', updateContinueButton);
      }
      
      if (continueBtn) {
        continueBtn.addEventListener('click', continueToNext);
      }
      
      if (backBtn) {
        backBtn.addEventListener('click', goBack);
      }
      
      if (closeBtn) {
        closeBtn.addEventListener('click', closeModal);
      }
      
      // Close on outside click
      document.querySelector('.container')?.addEventListener('click', function(e) {
        if (e.target === document.querySelector('.container')) {
          closeModal();
        }
      });
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadPreviousFormData();
      loadPreviousEmailData();
      updateContinueButton();
      setupEventListeners();
    });
  </script>
</body>
</html>
