<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interior Service | Service Type</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f5f0ea;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
    }

    /* Warm gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #faf7f2 0%, #f0e8e0 100%);
      z-index: 0;
    }

    /* Subtle pattern */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(#c4a47c 0.5px, transparent 0.5px);
      background-size: 24px 24px;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 600px;
      padding: 24px;
    }

    /* Main card */
    .service-selector {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(140, 108, 85, 0.1);
      overflow: hidden;
    }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #f0e8e0;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .progress {
      width: 50%;
      height: 100%;
      background: #8c6c55;
      border-radius: 6px;
      transition: width 0.3s ease;
    }

    h2 {
      font-size: 24px;
      font-weight: 700;
      color: #2c241a;
      margin-bottom: 24px;
      text-align: center;
    }

    /* Options grid */
    .options-grid {
      padding: 0 52px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option {
      display: flex;
      align-items: center;
      border: 1.5px solid #ede3d8;
      border-radius: 16px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.2s;
      background: #ffffff;
    }
    .option:hover {
      border-color: #c4a47c;
      background: #fefcf9;
    }
    .option.selected {
      border-color: #8c6c55;
      background: #fffaf5;
      box-shadow: 0 4px 12px rgba(140, 108, 85, 0.1);
    }
    .option input {
      margin-right: 14px;
      width: 18px;
      height: 18px;
      accent-color: #8c6c55;
      cursor: pointer;
    }
    .option-text {
      font-size: 16px;
      font-weight: 500;
      color: #2c241a;
    }
    .option.selected .option-text {
      color: #8c6c55;
    }

    /* Button container - flex row for side by side buttons */
    .btn-container {
      display: flex;
      gap: 16px;
      padding: 10px 52px 40px;
      width: 100%;
    }

    /* Button styles */
    .btn {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-back {
      background: #f5ede6;
      color: #8c6c55;
      border: 1px solid #ede3d8;
    }

    .btn-back:hover {
      background: #efe5db;
      transform: translateY(-1px);
    }

    .btn-continue {
      background: #8c6c55;
      color: #fff;
    }

    .btn-continue:hover:not(:disabled) {
      background: #7a5b46;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(140, 108, 85, 0.25);
    }

    .btn-continue:disabled {
      background: #d4c5b8;
      cursor: not-allowed;
      transform: none;
    }

    /* Close button */
    .close {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 26px;
      cursor: pointer;
      color: #b8a694;
      transition: all 0.2s;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #f8f3ee;
      z-index: 20;
    }
    .close:hover {
      color: #8c6c55;
      background: #efe5db;
      transform: rotate(90deg);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .options-grid {
        padding: 0 24px 20px;
      }
      .btn-container {
        padding: 10px 24px 32px;
        gap: 12px;
      }
      h2 {
        font-size: 20px;
      }
      .btn {
        padding: 12px 16px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="service-selector">
      <!-- <span class="close" id="closeBtn">&times;</span> -->

      <!-- Progress bar -->
      <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
      </div>

      <!-- Header -->
      <div class="options-grid">
        <h2>What type of Services?</h2>
      </div>

      <!-- Options - exactly matching original values -->
      <div class="options-grid" id="optionsGrid">
        <label class="option" data-value="Design only">
          <input type="radio" name="type_of_service" value="Design only">
          <span class="option-text">Design only</span>
        </label>
        <label class="option" data-value="Turnkey">
          <input type="radio" name="type_of_service" value="Turnkey">
          <span class="option-text">Turnkey</span>
        </label>
        <!-- <label class="option" data-value="Build only">
          <input type="radio" name="type_of_service" value="Build only">
          <span class="option-text">Build only</span>
        </label> -->
      </div>

      <!-- Buttons in one line (side by side) -->
      <div class="btn-container">
        <button class="btn btn-back" id="backBtn">← Back</button>
        <button class="btn btn-continue" id="continueBtn" disabled>Continue →</button>
      </div>
    </div>
  </div>

  <script>
    let formData = {};
    let spacesFormData = {};

    // DOM elements
    const options = document.querySelectorAll('.option');
    const continueBtn = document.getElementById('continueBtn');
    const closeBtn = document.getElementById('closeBtn');
    const backBtn = document.getElementById('backBtn');

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      continueBtn.disabled = true;
      setupEventListeners();

      // Load previously selected spaces data (from step 1)
      const spacesStored = localStorage.getItem('spacesFormData');
      if (spacesStored) {
        spacesFormData = JSON.parse(spacesStored);
        console.log("Loaded spaces data:", spacesFormData);
      }

      // Preselect previously chosen service type if available
      const stored = localStorage.getItem('serviceFormData');
      if (stored) {
        const saved = JSON.parse(stored);
        if (saved.serviceType) {
          const option = Array.from(options).find(opt => 
            opt.querySelector('input').value === saved.serviceType
          );
          if (option) {
            options.forEach(opt => opt.classList.remove('selected'));
            option.classList.add('selected');
            const radio = option.querySelector('input');
            radio.checked = true;
            formData.serviceType = saved.serviceType;
            continueBtn.disabled = false;
          }
        }
      }
    });

    function setupEventListeners() {
      // Service type selection
      options.forEach(option => {
        option.addEventListener('click', function(e) {
          // Remove previous selection
          options.forEach(opt => opt.classList.remove('selected'));
          this.classList.add('selected');
          
          const radio = this.querySelector('input[type="radio"]');
          radio.checked = true;
          formData.serviceType = radio.value;
          
          continueBtn.disabled = false;
          
          // Store data in localStorage
          localStorage.setItem('serviceFormData', JSON.stringify(formData));
          console.log("Service type selected:", formData.serviceType);
        });
      });

      // Close button
      if (closeBtn) {
        closeBtn.addEventListener('click', closeModal);
      }

      // Back button - go to previous step (space-type page)
      if (backBtn) {
        backBtn.addEventListener('click', goBack);
      }
    }

    function continueToNext() {
      if (!formData.serviceType) return;
      
      // Merge spaces data and service data for complete form
      const completeFormData = {
        ...spacesFormData,
        ...formData,
        timestamp: new Date().toISOString()
      };
      
      // Store combined data for next pages
      localStorage.setItem('serviceFormData', JSON.stringify(formData));
      localStorage.setItem('completeFormData', JSON.stringify(completeFormData));
      
      // Redirect to next step (project-type / property size page)
      window.location.href = 'project-type.html';
    }

    function goBack() {
      // Go back to space selection page
      window.location.href = 'index.html';
    }

    function closeModal() {
      // Do nothing - stay on the same page (prevents white screen)
      console.log('Close clicked - staying on page');
    }

    // Close modal when clicking outside
    document.querySelector('.container')?.addEventListener('click', function(e) {
      if (e.target === document.querySelector('.container')) {
        closeModal();
      }
    });

    // Attach continue button handler
    continueBtn.addEventListener('click', continueToNext);
  </script>
</body>
</html>
