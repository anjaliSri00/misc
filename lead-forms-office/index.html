<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interior Service | Space Type</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f5f0ea;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
    }

    /* Warm gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #faf7f2 0%, #f0e8e0 100%);
      z-index: 0;
    }

    /* Subtle pattern */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(#c4a47c 0.5px, transparent 0.5px);
      background-size: 24px 24px;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 600px;
      padding: 24px;
    }

    /* Main card */
    .space-selector {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(140, 108, 85, 0.1);
      overflow: hidden;
    }

    /* Header - with EXACT content */
    .header {
      padding: 10px 10px 10px;
      /* border-bottom: 1px solid #efe5db; */
    }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #f0e8e0;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .progress {
      width: 25%;
      height: 100%;
      background: #8c6c55;
      border-radius: 6px;
      transition: width 0.3s ease;
    }

    h2 {
      font-size: 24px;
      font-weight: 700;
      color: #2c241a;
      margin-bottom: 24px;
      text-align: center;
    }

    /* Options - matching original structure but styled */
    .options-grid {
      padding: 0 52px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option {
      display: flex;
      align-items: center;
      border: 1.5px solid #ede3d8;
      border-radius: 16px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.2s;
      background: #ffffff;
    }
    .option:hover {
      border-color: #c4a47c;
      background: #fefcf9;
    }
    .option.selected {
      border-color: #8c6c55;
      background: #fffaf5;
      box-shadow: 0 4px 12px rgba(140, 108, 85, 0.1);
    }
    .option input {
      margin-right: 14px;
      width: 18px;
      height: 18px;
      accent-color: #8c6c55;
      cursor: pointer;
    }
    .option-text {
      font-size: 16px;
      font-weight: 500;
      color: #2c241a;
    }
    .option.selected .option-text {
      color: #8c6c55;
    }

    /* Button */
    .btn {
      display: block;
      width: calc(100% - 104px);
      margin: 20px 52px 40px;
      padding: 14px;
      background: #8c6c55;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover:not(:disabled) {
      background: #7a5b46;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(140, 108, 85, 0.25);
    }
    .btn:disabled {
      background: #d4c5b8;
      cursor: not-allowed;
    }

    /* Close button */
    .close {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 26px;
      cursor: pointer;
      color: #b8a694;
      transition: all 0.2s;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #f8f3ee;
    }
    .close:hover {
      color: #8c6c55;
      background: #efe5db;
      transform: rotate(90deg);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header {
        padding: 32px 24px 20px;
      }
      .options-grid {
        padding: 0 24px 20px;
      }
      .btn {
        width: calc(100% - 48px);
        margin: 20px 24px 32px;
      }
      h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="space-selector">
      <!-- <span class="close" id="closeBtn">&times;</span> -->

      <!-- Progress bar -->
      <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
      </div>

      <!-- EXACT content from your original -->
      <div class="header">
        <h2>What type of Property?</h2>
      </div>

      <!-- Options - exactly matching original values -->
      <div class="options-grid" id="optionsGrid">
        <label class="option" data-value="Residential">
          <input type="radio" name="property_type" value="Residential">
          <span class="option-text">Residential</span>
        </label>
        <label class="option" data-value="Commercial">
          <input type="radio" name="property_type" value="Commercial">
          <span class="option-text">Commercial</span>
        </label>
      </div>

      <button class="btn" id="continueBtn" disabled>Continue</button>
    </div>
  </div>

  <script>
    let formData = {};

    // DOM elements
    const options = document.querySelectorAll('.option');
    const continueBtn = document.getElementById('continueBtn');
    const closeBtn = document.getElementById('closeBtn');

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      continueBtn.disabled = true;
      setupEventListeners();

      // Preselect previously chosen space type if available
      const stored = localStorage.getItem('propertyFormData');
      if (stored) {
        const saved = JSON.parse(stored);
        if (saved.property_type) {
          const option = Array.from(options).find(opt => 
            opt.querySelector('input').value === saved.property_type
          );
          if (option) {
            options.forEach(opt => opt.classList.remove('selected'));
            option.classList.add('selected');
            const radio = option.querySelector('input');
            radio.checked = true;
            formData.property_type = saved.property_type;
            continueBtn.disabled = false;
          }
        }
      }
    });

    function setupEventListeners() {
      // Space type selection
      options.forEach(option => {
        option.addEventListener('click', function(e) {
          // Don't trigger if clicking on radio directly (but it's fine)
          options.forEach(opt => opt.classList.remove('selected'));
          this.classList.add('selected');
          
          const radio = this.querySelector('input[type="radio"]');
          radio.checked = true;
          formData.property_type = radio.value;
          
          continueBtn.disabled = false;
          
          // Store data in localStorage
          localStorage.setItem('propertyFormData', JSON.stringify(formData));
        });
      });

      // Close button
      if (closeBtn) {
        closeBtn.addEventListener('click', closeModal);
      }
    }

    function continueToNext() {
      if (!formData.property_type) return;
      
      // Store data for next page
      localStorage.setItem('propertyFormData', JSON.stringify(formData));
      
      // Redirect to next step
    //  if(formData.property_type ==="Residential"){ 
      window.location.href = 'space-type.html';
    //  }
    }

    function closeModal() {
      // Do nothing - stay on the same page (prevents white screen)
      console.log('Close clicked - staying on page');
    }

    // Close modal when clicking outside
    document.querySelector('.container')?.addEventListener('click', function(e) {
      if (e.target === document.querySelector('.container')) {
        closeModal();
      }
    });

    // Attach continue button handler
    continueBtn.addEventListener('click', continueToNext);
  </script>
</body>
</html>
