<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interior Service Modal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      background-image: url('assets/int3.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Modal */
    .modal {
      background: #fff;
      width: 450px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      padding: 24px;
      position: relative;
    }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #e5e7eb;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .progress {
      width: 20%; /* First step */
      height: 100%;
      background: #3b82f6;
      transition: width 0.3s ease;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 20px;
      text-align: center;
      color: #1f2937;
    }

    .option {
      display: flex;
      align-items: center;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .option:hover {
      border-color: #3b82f6;
      background: #f8fafc;
    }
    .option.selected {
      border-color: #3b82f6;
      background: #eff6ff;
    }
    .option input {
      margin-right: 12px;
    }

    .option input[type="text"] {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      background: transparent;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 16px;
    }
    .btn:hover {
      background: #2563eb;
    }
    .btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    /* Close button */
    .close {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 20px;
      cursor: pointer;
      color: #6b7280;
    }
    .close:hover {
      color: #111827;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="modal">
      <span class="close">&times;</span>

      <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
      </div>

      <h2>What type of interior service do you need?</h2>

      <label class="option" data-value="complete project">
        <input type="radio" name="type_of_service" value="complete project">
        Complete project - designing and installation
      </label>
       <label class="option" data-value="design only">
        <input type="radio" name="type_of_service" value="design only">
        Design only
      </label>
       <label class="option" data-value="installation only">
        <input type="radio" name="type_of_service" value="installation only">
        Installation only
      </label>
      <label class="option" data-value="other">
        <input type="radio" name="type_of_service" value="other">
        Other 
      </label>

      <button class="btn" id="continueBtn" disabled onclick="continueToNext()">Continue</button>
    </div>
  </div>

  <script>
    let formData = {};

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      // Ensure continue button is disabled by default
      document.getElementById('continueBtn').disabled = true;
      
      setupEventListeners();

      // Preselect previously chosen service type if available
      const stored = localStorage.getItem('serviceFormData');
      if (stored) {
        const saved = JSON.parse(stored);
        if (saved.serviceType) {
          const radio = document.querySelector(`label.option input[type="radio"][value="${saved.serviceType}"]`);
          if (radio) {
            const optionEl = radio.closest('.option');
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            optionEl.classList.add('selected');
            radio.checked = true;
            formData.serviceType = saved.serviceType;
            // Enable continue button only if option is selected
            document.getElementById('continueBtn').disabled = false;
          }
        }
      }
    });

    function setupEventListeners() {
      // Service type selection
      document.querySelectorAll('.option').forEach(option => {
        option.addEventListener('click', function() {
          // Remove previous selection
          document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
          // Add selection to clicked option
          this.classList.add('selected'); 
          
          // Enable continue button
          document.getElementById('continueBtn').disabled = false;
          
          // Store selection
          const radio = this.querySelector('input[type="radio"]');
          formData.serviceType = radio.value;
          
          
          console.log("Service type selected",formData.serviceType);

          // Store data in localStorage first
          localStorage.setItem('serviceFormData', JSON.stringify(formData));
        });
      });

      // Close button
      document.querySelector('.close').addEventListener('click', closeModal);
    }

    function continueToNext() {
      // Store the selected service type
      // console.log('Service type selected:', formData);
      
      // Store data in localStorage for the next page
      localStorage.setItem('serviceFormData', JSON.stringify(formData));
      
      // Redirect based on service type
      // if (formData.serviceType === 'office') {
      //   window.location.href = 'project-type.html';
      // } else
       if (formData.serviceType === 'other') {
        window.location.href = 'other-services.html';
      }else{
        window.location.href = 'project-type.html';
      }
    }

    function closeModal() {
      // Do nothing - stay on the same page
      // This prevents the white screen issue when clicking outside
    }

    // Close modal when clicking outside
    document.querySelector('.overlay').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });
  </script>
</body>
</html>
